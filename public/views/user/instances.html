<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的虚拟机 — CloudVM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<style>
  .vm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 16px; }
  .vm-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; backdrop-filter: blur(12px); transition: all 0.3s ease; position: relative; overflow: hidden; }
  .vm-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(37,99,235,0.03), transparent); opacity: 0; transition: opacity 0.3s; }
  .vm-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); border-color: rgba(37,99,235,0.2); }
  .vm-card:hover::before { opacity: 1; }
  .vm-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .vm-card-name { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-1); display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .status-dot.running { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.4); }
  .status-dot.stopped { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  .status-dot.suspended { background: #f59e0b; }
  .status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; }
  .status-badge.running { background: rgba(16,185,129,0.15); color: #10b981; }
  .status-badge.stopped { background: rgba(239,68,68,0.12); color: #ef4444; }
  .status-badge.suspended { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .vm-info-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .vm-info-item { display: flex; align-items: center; gap: 4px; }
  .vm-info-item .label { font-size: 11px; color: var(--text-3); }
  .vm-info-item .value { font-size: 12px; color: var(--text-1); font-family: 'JetBrains Mono', monospace; }
  .copy-btn { background: none; border: none; cursor: pointer; padding: 0; color: var(--text-3); opacity: 0; transition: opacity 0.2s; }
  .vm-card:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); }
  .type-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
  .type-badge.kvm { background: rgba(37,99,235,0.12); color: #3b82f6; }
  .type-badge.lxc { background: rgba(139,92,246,0.12); color: #8b5cf6; }
  .vm-specs { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; padding: 12px; background: var(--bg-1); border-radius: 8px; }
  .spec-item { text-align: center; }
  .spec-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; margin-bottom: 2px; }
  .spec-value { font-size: 14px; font-weight: 600; color: var(--text-1); }
  .expiry-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .expiry-date { font-size: 12px; color: var(--text-3); }
  .expiry-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; }
  .expiry-badge.safe { background: rgba(16,185,129,0.1); color: #10b981; }
  .expiry-badge.warn { background: rgba(245,158,11,0.12); color: #f59e0b; }
  .expiry-badge.danger { background: rgba(239,68,68,0.12); color: #ef4444; }
  .vm-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .vm-action-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); cursor: pointer; transition: all 0.2s; }
  .vm-action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,0.06); }
  .vm-action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .vm-action-btn.primary:hover { opacity: 0.9; }
  .vm-action-btn.danger { color: #ef4444; border-color: rgba(239,68,68,0.3); }
  .vm-action-btn.danger:hover { background: rgba(239,68,68,0.06); }
  .vm-action-btn.success { color: #10b981; border-color: rgba(16,185,129,0.3); }
  .vm-action-btn.success:hover { background: rgba(16,185,129,0.06); }
  .filter-bar { display: flex; align-items: center; gap: 8px; }
  .filter-bar select { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); font-size: 13px; font-family: 'Outfit', sans-serif; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-icon { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; margin-bottom: 8px; }
  .stat-icon.blue { background: rgba(37,99,235,0.1); color: #3b82f6; }
  .stat-icon.gray { background: rgba(156,163,175,0.1); color: #9ca3af; }
  .stat-icon.orange { background: rgba(245,158,11,0.1); color: #f59e0b; }
  .stat-value { font-size: 24px; font-weight: 800; color: var(--text-1); }
  .stat-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-header h2 { font-size: 18px; margin: 0; }
</style>
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor"/><polyline points="8 21 12 17 16 21" stroke="currentColor"/></svg>
      <span class="brand-text">CloudVM<span class="brand-accent">Pro</span></span>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>控制台总览
      </a>
      <a class="sidebar-item active" href="instances.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>我的虚拟机
        <span class="sidebar-badge" id="sidebarVmCount">0</span>
      </a>
      <a class="sidebar-item" href="products.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>购买产品
      </a>
      <a class="sidebar-item" href="billing.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>充值 & 账单
      </a>
      <a class="sidebar-item" href="tickets.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单支持
        <span class="sidebar-badge" id="sidebarTicketCount" style="display:none">0</span>
      </a>
      <a class="sidebar-item" href="announcements.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>系统公告
      </a>
      <a class="sidebar-item" href="profile.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>账号设置
      </a>
      <a class="sidebar-item" href="verify.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>实名认证
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <button class="topbar-btn" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="topbar-title">我的虚拟机</span>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <div class="user-avatar" id="userAvatar">T</div>
        <span class="user-name" id="userName">TestUser</span>
      </div>
    </header>

    <div class="page-content">
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="dashboard.html">控制台</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">我的虚拟机</span>
      </div>

      <!-- Stats -->
      <div class="stats-grid" id="instancesStats">
        <div class="stat-card">
          <div class="stat-icon blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg></div>
          <div class="stat-value" id="statTotal">-</div>
          <div class="stat-label">总计</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
          <div class="stat-value" id="statRunning">-</div>
          <div class="stat-label">运行中</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon gray"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></div>
          <div class="stat-value" id="statStopped">-</div>
          <div class="stat-label">已停止</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="stat-value" id="statExpiring">-</div>
          <div class="stat-label">即将到期</div>
        </div>
      </div>

      <!-- Filter -->
      <div class="section-header">
        <h2>实例列表</h2>
        <div class="filter-bar">
          <select id="statusFilter" onchange="filterVMs()">
            <option value="all">全部状态</option>
            <option value="running">运行中</option>
            <option value="stopped">已停止</option>
            <option value="suspended">已暂停</option>
          </select>
        </div>
      </div>

      <!-- VM Grid -->
      <div class="vm-grid" id="vmContainer">
        <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3);display:flex;flex-direction:column;align-items:center;gap:12px">
          <div class="spinner" style="width:24px;height:24px"></div>
          <span>加载虚拟机列表中...</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../../js/dashboard.js"></script>
<script src="../../js/main.js"></script>
<script>
let allVms = [];

async function loadData() {
  try {
    const token = localStorage.getItem('admin_token');
    if (!token) { window.location.href = '../auth/login.html'; return; }

    const [meRes, vmsRes] = await Promise.all([
      fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } }),
      fetch('/api/vms', { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } }),
    ]);
    const me = await meRes.json();
    const vms = await vmsRes.json();

    // Update user
    if (me.success) {
      const name = me.data?.name || me.data?.user?.name || '用户';
      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = name[0];
    }

    // Process VMs
    if (vms.success) {
      allVms = vms.data?.data || vms.data || [];
    }
    
    updateStats();
    renderVms(allVms);
    document.getElementById('sidebarVmCount').textContent = allVms.length;
  } catch(e) {
    console.error('Load failed', e);
  }
}

function updateStats() {
  const total = allVms.length;
  const running = allVms.filter(v => v.status === 'running').length;
  const stopped = allVms.filter(v => v.status === 'stopped').length;
  const expiring = allVms.filter(v => {
    if (!v.expires_at) return false;
    const days = (new Date(v.expires_at) - new Date()) / 86400000;
    return days > 0 && days < 30;
  }).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statRunning').textContent = running;
  document.getElementById('statStopped').textContent = stopped;
  document.getElementById('statExpiring').textContent = expiring;
}

function renderVms(vms) {
  const container = document.getElementById('vmContainer');
  if (!container) return;
  if (!vms.length) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3)">暂无虚拟机实例。<br><br><a href="products.html" class="btn primary">立即购买</a></div>';
    return;
  }
  container.innerHTML = vms.map(vm => {
    const isRunning = vm.status === 'running';
    const isStopped = vm.status === 'stopped';
    const expires = vm.expires_at ? new Date(vm.expires_at) : null;
    const daysLeft = expires ? Math.ceil((expires - new Date()) / 86400000) : null;
    let expiryClass = 'safe';
    if (daysLeft !== null && daysLeft < 0) expiryClass = 'danger';
    else if (daysLeft !== null && daysLeft < 30) expiryClass = 'warn';
    const vmIdDisplay = vm.vm_id || vm.id;
    const type = (vm.type || 'kvm').toUpperCase();
    
    return `<div class="vm-card">
      <div class="vm-card-header">
        <div class="vm-card-name">
          <span class="status-dot ${isRunning ? 'running' : isStopped ? 'stopped' : 'suspended'}"></span>
          ${vm.name || 'VM #' + vm.id}
        </div>
        <span class="status-badge ${isRunning ? 'running' : isStopped ? 'stopped' : 'suspended'}">${isRunning ? '运行中' : isStopped ? '已停止' : '已暂停'}</span>
      </div>
      <div class="vm-info-row">
        <div class="vm-info-item">
          <span class="label">ID:</span>
          <span class="value">${vmIdDisplay}</span>
        </div>
        <div class="vm-info-item">
          <span class="label">IP:</span>
          <span class="value">${vm.ipv4 || vm.ip || 'NAT'}</span>
        </div>
        <span class="type-badge ${type.toLowerCase()}">${type}</span>
      </div>
      <div class="vm-specs">
        <div class="spec-item"><div class="spec-label">CPU</div><div class="spec-value">${vm.cpu} 核</div></div>
        <div class="spec-item"><div class="spec-label">内存</div><div class="spec-value">${vm.memory} MB</div></div>
        <div class="spec-item"><div class="spec-label">磁盘</div><div class="spec-value">${vm.disk} GB</div></div>
        <div class="spec-item"><div class="spec-label">带宽</div><div class="spec-value">${vm.bandwidth || '-'} Mbps</div></div>
      </div>
      <div class="expiry-row">
        <span class="expiry-date">${expires ? '到期: ' + expires.toLocaleDateString('zh-CN') : ''}</span>
        ${daysLeft !== null ? `<span class="expiry-badge ${expiryClass}">${daysLeft >= 0 ? '剩余 ' + daysLeft + ' 天' : '已过期'}</span>` : ''}
      </div>
      <div class="vm-actions">
        ${isRunning ? `
          <a href="instance-detail.html?id=${vm.id}" class="vm-action-btn primary" style="text-decoration:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>VNC 控制台
          </a>
          <button class="vm-action-btn danger" onclick="VMOperations.perform(${vm.id},'stop','关机')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>停止
          </button>
          <button class="vm-action-btn" onclick="VMOperations.perform(${vm.id},'restart','重启')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>重启
          </button>
        ` : `
          <button class="vm-action-btn success" onclick="VMOperations.perform(${vm.id},'start','开机')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>启动
          </button>
        `}
        <a href="instance-detail.html?id=${vm.id}" class="vm-action-btn" style="text-decoration:none;">详情 &rarr;</a>
      </div>
    </div>`;
  }).join('');
}

window.filterVMs = function() {
  const status = document.getElementById('statusFilter').value;
  if (status === 'all') renderVms(allVms);
  else renderVms(allVms.filter(v => v.status === status));
};

// Start
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
