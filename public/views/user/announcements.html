<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统公告 - CloudVM Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-1); margin: 0; }
    .page-header p { color: var(--text-3); font-size: 13px; margin: 4px 0 0; }

    .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 7px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .announcements-list { display: flex; flex-direction: column; gap: 14px; }

    .announcement-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 20px; backdrop-filter: blur(12px); transition: all 0.3s ease; cursor: pointer; }
    .announcement-card:hover { border-color: var(--accent); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .announcement-card.pinned { border-color: rgba(37,99,235,0.2); background: linear-gradient(135deg, rgba(37,99,235,0.03), var(--card-bg)); }
    .announcement-card.viewed { opacity: 0.7; }
    .announcement-card.viewed:hover { opacity: 1; }

    .announcement-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .type-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 6px; letter-spacing: 0.03em; flex-shrink: 0; }
    .type-badge.notice { background: rgba(37,99,235,0.12); color: #2563eb; }
    .type-badge.maintenance { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .type-badge.update { background: rgba(16,185,129,0.12); color: #10b981; }
    .type-badge.event { background: rgba(139,92,246,0.12); color: #8b5cf6; }

    .pin-badge { display: flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

    .announcement-date { font-size: 12px; color: var(--text-3); margin-left: auto; flex-shrink: 0; }

    .announcement-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-1); margin-bottom: 8px; }

    .announcement-preview { font-size: 13px; color: var(--text-2); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: all 0.3s; }
    .announcement-card.expanded .announcement-preview { -webkit-line-clamp: unset; display: block; }

    .announcement-full { display: none; font-size: 13px; color: var(--text-2); line-height: 1.7; padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--border); }
    .announcement-card.expanded .announcement-full { display: block; }
    .announcement-card.expanded .announcement-preview { display: none; }

    .view-detail { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; color: var(--accent); margin-top: 8px; }
    .announcement-card.expanded .view-detail { display: none; }

    .empty-state { text-align: center; padding: 60px 20px; background: var(--card-bg); border: 1px dashed var(--border); border-radius: 16px; color: var(--text-3); }
    .empty-state svg { margin-bottom: 16px; opacity: 0.4; }

    @media (max-width: 768px) {
      .announcement-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .announcement-date { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="sidebar-header">
        <div class="nav-brand">
          <div class="brand-icon"><svg width="20" height="20" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
          <span class="brand-name">CloudVM<span class="brand-pro">Pro</span></span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-label">主菜单</div>
          <a class="sidebar-item" href="dashboard.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>控制台</a>
          <a class="sidebar-item" href="instances.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>我的虚拟机</a>
          <a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>购买产品</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-label">账户</div>
          <a class="sidebar-item" href="billing.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>充值 & 账单</a>
          <a class="sidebar-item" href="tickets.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单支持</a>
          <a class="sidebar-item active" href="announcements.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>系统公告</a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-label">设置</div>
          <a class="sidebar-item" href="profile.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>账号设置</a>
          <a class="sidebar-item" href="verify.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>实名认证</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div><div style="font-size:12px;color:var(--text-3)">Balance</div><div style="font-size:16px;font-weight:600">¥ 1,280.00</div></div>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <button class="topbar-btn sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><a href="dashboard.html">控制台</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">系统公告</span></div>
      <div class="topbar-actions"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
    </header>
    <div class="page-content">
      <!-- Page Header -->
      <div class="page-header">
        <h1>系统公告</h1>
        <p>了解 CloudVM Pro 的最新动态、维护计划和产品更新</p>
      </div>

      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterAnnouncements('all', this)">全部公告</button>
        <button class="filter-tab" onclick="filterAnnouncements('notice', this)">系统通知</button>
        <button class="filter-tab" onclick="filterAnnouncements('maintenance', this)">维护公告</button>
        <button class="filter-tab" onclick="filterAnnouncements('update', this)">产品更新</button>
        <button class="filter-tab" onclick="filterAnnouncements('event', this)">活动通知</button>
      </div>

      <!-- Announcements List -->
      <div class="announcements-list" id="announcementsList">
        <!-- Dynamically loaded from API -->
        <div style="text-align:center;padding:40px;color:var(--text-3)" id="announceLoading">加载中...</div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/dashboard.js"></script>
<script src="../../js/api.js"></script>
<script>
  let allAnnouncements = [];

  document.addEventListener('DOMContentLoaded', function() {
    loadAnnouncements();
  });

  async function loadAnnouncements() {
    const el = document.getElementById('announcementsList');
    if (!el) return;
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-3)"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px"></div>加载中...</div>';
    
    try {
      const res = await fetch('/api/announcements', { headers: { 'Accept': 'application/json' } });
      const data = await res.json();
      
      if (data.success && data.data) {
        allAnnouncements = Array.isArray(data.data) ? data.data : (data.data.data || []);
      }
    } catch(e) {}
    
    renderAnnouncements('all');
  }

  function renderAnnouncements(type) {
    const el = document.getElementById('announcementsList');
    if (!el) return;
    
    let list = allAnnouncements;
    if (type !== 'all') {
      list = list.filter(a => a.type === type);
    }
    
    if (!list.length) {
      el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-3)">暂无公告</div>';
      return;
    }
    
    const read = JSON.parse(localStorage.getItem('readAnnouncements') || '[]');
    
    el.innerHTML = list.map(a => {
      const aid = a.id;
      const isPinned = a.is_pinned || a.pinned;
      const isViewed = read.includes(String(aid));
      const typeMap = { 'notice': '系统通知', 'maintenance': '维护公告', 'update': '产品更新', 'event': '活动通知' };
      const typeName = typeMap[a.type] || a.type || '通知';
      
      return `<div class="announcement-card ${isPinned ? 'pinned' : ''} ${isViewed ? 'viewed' : ''}" data-type="${a.type}" data-id="${aid}" onclick="toggleExpand(this)">
        <div class="announcement-header">
          <span class="type-badge ${a.type}">${typeName}</span>
          ${isPinned ? '<span class="pin-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>置顶</span>' : ''}
          <span class="announcement-date">${new Date(a.created_at || a.published_at).toISOString().slice(0,10)}</span>
        </div>
        <div class="announcement-title">${a.title}</div>
        <div class="announcement-preview">${a.summary || a.excerpt || (a.content ? a.content.replace(/<[^>]*>/g,'').slice(0,200) : '')}</div>
        ${a.content ? `<div class="announcement-full">${a.content}</div>` : ''}
        ${a.content ? '<div class="view-detail">查看详情 →</div>' : ''}
      </div>`;
    }).join('');
    
    // Re-apply read states
    read.forEach(id => {
      const card = el.querySelector('.announcement-card[data-id="' + id + '"]');
      if (card) card.classList.add('viewed');
    });
  }

  function toggleExpand(card) {
    const isExpanded = card.classList.contains('expanded');
    if (!isExpanded) {
      card.classList.add('viewed');
      const id = card.dataset.id;
      let read = JSON.parse(localStorage.getItem('readAnnouncements') || '[]');
      if (!read.includes(id)) read.push(id);
      localStorage.setItem('readAnnouncements', JSON.stringify(read));
    }
    card.classList.toggle('expanded');
  }

  function filterAnnouncements(type, btn) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderAnnouncements(type);
  }
</script>
</body>
</html>
