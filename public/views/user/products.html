<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购买产品 - CloudVM Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <style>
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; color: var(--text-1); margin: 0; }
    .page-header p { color: var(--text-3); font-size: 13px; margin: 4px 0 0; }

    .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 7px 18px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .billing-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 13px; color: var(--text-2); }
    .toggle-switch { position: relative; width: 48px; height: 26px; }
    .toggle-switch input { display: none; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 13px; cursor: pointer; transition: 0.3s; }
    .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(22px); }
    .save-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; background: rgba(16,185,129,0.12); color: #10b981; }

    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 24px; backdrop-filter: blur(12px); transition: all 0.3s ease; position: relative; overflow: hidden; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.12); border-color: var(--accent); }
    .product-card.featured { border-color: rgba(37,99,235,0.3); }
    .product-card.featured::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #2563eb, #8b5cf6); }
    .hot-badge { position: absolute; top: 16px; right: 16px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; letter-spacing: 0.03em; }

    .product-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; font-size: 24px; }
    .product-icon.basic { background: rgba(107,114,128,0.1); color: #6b7280; }
    .product-icon.standard { background: rgba(37,99,235,0.1); color: #2563eb; }
    .product-icon.premium { background: rgba(139,92,246,0.1); color: #8b5cf6; }
    .product-icon.enterprise { background: rgba(245,158,11,0.1); color: #f59e0b; }

    .product-name { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 600; color: var(--text-1); margin-bottom: 4px; }
    .product-type-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .type-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; letter-spacing: 0.05em; }
    .type-badge.kvm { background: rgba(37,99,235,0.1); color: #2563eb; }
    .type-badge.lxc { background: rgba(139,92,246,0.1); color: #8b5cf6; }

    .specs-list { list-style: none; padding: 0; margin: 0 0 16px; }
    .specs-list li { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; color: var(--text-2); border-bottom: 1px solid var(--border); }
    .specs-list li:last-child { border-bottom: none; }
    .specs-list li svg { flex-shrink: 0; color: var(--accent); }
    .spec-value { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; }

    .features-list { list-style: none; padding: 0; margin: 0 0 20px; }
    .features-list li { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; color: var(--text-3); }
    .features-list li svg { flex-shrink: 0; color: #10b981; }

    .pricing { text-align: center; padding: 16px 0; border-top: 1px solid var(--border); margin-bottom: 16px; }
    .price-monthly { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 800; color: var(--text-1); line-height: 1; }
    .price-monthly .currency { font-size: 20px; vertical-align: top; margin-top: 4px; display: inline-block; }
    .price-monthly .period { font-size: 13px; font-weight: 400; color: var(--text-3); }
    .price-yearly { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .price-yearly .orig { text-decoration: line-through; margin-right: 6px; }

    .availability { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); margin-bottom: 14px; }
    .avail-dot { width: 7px; height: 7px; border-radius: 50%; }
    .avail-dot.good { background: #10b981; }
    .avail-dot.limited { background: #f59e0b; }

    .buy-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .buy-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(37,99,235,0.3); }

    /* Order Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-1); margin: 0 0 20px; }
    .order-summary { background: var(--bg-2); border-radius: 10px; padding: 14px; margin-bottom: 18px; }
    .order-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--text-2); }
    .order-row.total { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; font-size: 16px; font-weight: 700; color: var(--text-1); }
    .coupon-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .coupon-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text-1); font-size: 13px; font-family: 'Outfit', sans-serif; }
    .coupon-btn { padding: 10px 18px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .coupon-btn:hover { background: var(--accent); color: #fff; }
    .payment-methods { display: flex; gap: 10px; margin-bottom: 18px; }
    .payment-method { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-2); text-align: center; cursor: pointer; transition: all 0.2s; font-size: 13px; color: var(--text-2); }
    .payment-method:hover { border-color: var(--accent); }
    .payment-method.selected { border-color: var(--accent); background: rgba(37,99,235,0.05); color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .modal-btn.cancel { background: var(--bg-2); color: var(--text-2); }
    .modal-btn.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }
    .modal-btn.confirm:hover { opacity: 0.9; }

    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .products-grid { grid-template-columns: 1fr; }
      .payment-methods { flex-direction: column; }
    }
  </style>
</head>
<body>

          <a class="sidebar-item" href="verify.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>实名认证</a>

  <div class="main-content">

      <button class="topbar-btn sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

<script>
// ===== Dynamic Products from API =====
(function() {
  var isYearly = false;
  var currentOrder = null;
  var allProducts = [];

  // SVG icons
  var cpuSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="3"/><line x1="8" y1="2" x2="8" y2="22"/></svg>';
  var memSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="17" x2="12" y2="22"/></svg>';
  var diskSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>';
  var bwSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>';
  var trafficSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>';
  var checkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>';

  var iconClasses = ['basic', 'standard', 'premium', 'enterprise'];

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatMem(mb) { return mb >= 1024 ? (mb/1024).toFixed(0) + ' GB' : mb + ' MB'; }
  function formatDisk(gb) { return gb + ' GB SSD'; }
  function formatTraffic(gb) {
    if (gb === -1 || gb === 0) return '不限流量';
    return gb >= 1024 ? (gb/1024).toFixed(0) + ' TB/月' : gb + ' GB/月';
  }
  function stockLabel(stock) { return stock === -1 ? '库存充足' : (stock > 0 ? '仅剩 ' + stock + ' 台' : '缺货'); }
  function stockClass(stock) { return stock === -1 || stock > 5 ? 'good' : 'limited'; }

  function loadProducts() {
    fetch('/api/products')
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.success && res.data && res.data.data && res.data.data.length) {
          allProducts = res.data.data.filter(function(p) { return p.status === 'active'; });
          allProducts.sort(function(a, b) { return (a.sort_order||0) - (b.sort_order||0); });
        }
        if (!allProducts.length) {
          // Fallback defaults
          allProducts = [
            {id:1,name:'基础型 KVM',type:'kvm',cpu:2,memory:4096,disk:50,bandwidth:5,traffic:500,monthly_price:49,yearly_price:499,features:['独立公网 IPv4','VNC 远程控制台','快照备份 x1'],stock:-1,sort_order:1},
            {id:2,name:'标准型 KVM',type:'kvm',cpu:4,memory:8192,disk:100,bandwidth:10,traffic:2048,monthly_price:129,yearly_price:1316,features:['独立公网 IPv4','VNC 远程控制台','快照备份 x3','DDoS 基础防护'],stock:-1,sort_order:2},
            {id:3,name:'高级型 KVM',type:'kvm',cpu:8,memory:16384,disk:200,bandwidth:30,traffic:5120,monthly_price:299,yearly_price:3050,features:['独立公网 IPv4 + IPv6','VNC 远程控制台','快照备份 x10','DDoS 高级防护','优先技术支持'],stock:3,sort_order:3},
            {id:4,name:'轻量型 LXC',type:'lxc',cpu:2,memory:2048,disk:30,bandwidth:5,traffic:300,monthly_price:29,yearly_price:296,features:['共享公网 IPv4','VNC 远程控制台','秒级启动'],stock:-1,sort_order:4},
            {id:5,name:'标准型 LXC',type:'lxc',cpu:4,memory:4096,disk:60,bandwidth:10,traffic:1024,monthly_price:69,yearly_price:704,features:['独立公网 IPv4','VNC 远程控制台','快照备份 x1','秒级启动'],stock:-1,sort_order:5},
            {id:6,name:'企业型 LXC',type:'lxc',cpu:8,memory:16384,disk:150,bandwidth:50,traffic:10240,monthly_price:189,yearly_price:1928,features:['独立公网 IPv4 + IPv6','VNC 远程控制台','快照备份 x5','DDoS 基础防护','独立资源池'],stock:-1,sort_order:6}
          ];
        }
        renderProducts();
      })
      .catch(function() {
        // On network error, keep whatever was loaded
        if (!allProducts.length) {
          allProducts = [{id:0,name:'加载失败',type:'',cpu:0,memory:0,disk:0,bandwidth:0,traffic:0,monthly_price:0,yearly_price:0,features:[],stock:0,sort_order:0}];
        }
        renderProducts();
      });
  }

  function renderProducts() {
    var grid = document.getElementById('productsGrid');
    var html = '';
    var featuredIdx = allProducts.length > 1 ? 1 : -1;

    allProducts.forEach(function(p, i) {
      var isFeatured = (i === featuredIdx);
      var icoCls = iconClasses[i % iconClasses.length];
      var typeUpper = p.type.toUpperCase();

      html += '<div class="product-card' + (isFeatured ? ' featured' : '') + '" data-type="' + p.type + '">';
      if (isFeatured) html += '<span class="hot-badge">热门</span>';
      html += '<div class="product-icon ' + icoCls + '">' + getIconSvg(i, p.type) + '</div>';
      html += '<div class="product-name">' + escHtml(p.name) + '</div>';
      html += '<div class="product-type-row">';
      html += '<span class="type-badge ' + p.type + '">' + typeUpper + '</span>';
      html += '<span style="font-size:11px;color:var(--text-3);">' + (p.description ? escHtml(p.description.substring(0,20)) : (p.type==='kvm'?'全虚拟化':'容器方案')) + '</span>';
      html += '</div>';

      // Specs
      html += '<ul class="specs-list">';
      html += '<li>' + cpuSvg + ' CPU <span class="spec-value">' + p.cpu + ' 核</span></li>';
      html += '<li>' + memSvg + ' 内存 <span class="spec-value">' + formatMem(p.memory) + '</span></li>';
      html += '<li>' + diskSvg + ' 磁盘 <span class="spec-value">' + formatDisk(p.disk) + '</span></li>';
      html += '<li>' + bwSvg + ' 带宽 <span class="spec-value">' + p.bandwidth + ' Mbps</span></li>';
      html += '<li>' + trafficSvg + ' 流量 <span class="spec-value">' + formatTraffic(p.traffic) + '</span></li>';
      html += '</ul>';

      // Features
      if (p.features && p.features.length) {
        html += '<ul class="features-list">';
        p.features.forEach(function(f) { html += '<li>' + checkSvg + ' ' + escHtml(f) + '</li>'; });
        html += '</ul>';
      }

      // Pricing
      var monthly = p.monthly_price || 0;
      var yearly = p.yearly_price || Math.round(monthly * 12 * 0.85);
      html += '<div class="pricing">';
      html += '<div class="price-monthly" id="price-' + p.id + '"><span class="currency">¥</span>' + monthly + '<span class="period">/月</span></div>';
      html += '<div class="price-yearly"><span class="orig">¥' + (monthly*12) + '/年</span> ¥' + yearly + '/年</div>';
      html += '</div>';

      html += '<div class="availability"><span class="avail-dot ' + stockClass(p.stock) + '"></span> ' + stockLabel(p.stock) + '</div>';
      html += '<button class="buy-btn" data-product-id="' + p.id + '" data-product-name="' + escHtml(p.name) + '" data-product-type="' + p.type + '" data-monthly="' + monthly + '" data-yearly="' + yearly + '">立即购买</button>';
      html += '</div>';
    });

    grid.innerHTML = html;
  }

  function getIconSvg(i, type) {
    var svgs = [
      '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="3"/></svg>',
      '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
      type === 'lxc' ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>'
        : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-7h7z"/></svg>'
    ];
    return svgs[i % svgs.length] || svgs[0];
  }

  // ===== Public API =====
  window.toggleBilling = function() {
    isYearly = document.getElementById('billingToggle').checked;
    document.getElementById('monthly-label').style.fontWeight = isYearly ? '400' : '600';
    document.getElementById('yearly-label').style.fontWeight = isYearly ? '600' : '400';
    document.getElementById('saveBadge').style.display = isYearly ? 'inline' : 'none';
    allProducts.forEach(function(p) {
      var el = document.getElementById('price-' + p.id);
      if (el) {
        var price = isYearly ? (p.yearly_price || Math.round(p.monthly_price * 12 * 0.85)) : p.monthly_price;
        var period = isYearly ? '/年' : '/月';
        el.innerHTML = '<span class="currency">¥</span>' + price + '<span class="period">' + period + '</span>';
      }
    });
  };

  window.filterProducts = function(type, btn) {
    document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.product-card[data-type]').forEach(function(card) {
      if (type === 'all' || card.dataset.type === type) {
        card.style.display = '';
      } else {
        card.style.display = 'none';
      }
    });
  };

  window._openOrder = function(name, type, monthlyPrice, yearlyPrice) {
    currentOrder = { name: name, type: type, monthlyPrice: monthlyPrice, yearlyPrice: yearlyPrice };
    document.getElementById('orderProduct').textContent = name;
    document.getElementById('orderType').textContent = type.toUpperCase();
    var price = isYearly ? yearlyPrice : monthlyPrice;
    var cycle = isYearly ? '按年' : '按月';
    document.getElementById('orderCycle').textContent = cycle;
    document.getElementById('orderUnitPrice').textContent = '¥' + price;
    document.getElementById('orderTotal').textContent = '¥' + price;
    document.getElementById('orderDiscount').textContent = '-¥0.00';
    document.getElementById('couponInput').value = '';
    document.getElementById('orderModal').classList.add('active');
  };

  window.closeOrder = function() {
    document.getElementById('orderModal').classList.remove('active');
  };

  window.selectPayment = function(el) {
    document.querySelectorAll('.payment-method').forEach(function(m) { m.classList.remove('selected'); });
    el.classList.add('selected');
  };

  window.applyCoupon = function() {
    var code = document.getElementById('couponInput').value.trim();
    if (code === 'VIP2026') {
      var price = isYearly ? currentOrder.yearlyPrice : currentOrder.monthlyPrice;
      var discount = Math.round(price * 0.2);
      document.getElementById('orderDiscount').textContent = '-¥' + discount;
      document.getElementById('orderTotal').textContent = '¥' + (price - discount);
    } else if (code) {
      alert('无效的优惠码');
    }
  };

  window.confirmOrder = function() {
    var payment = document.querySelector('.payment-method.selected').dataset.method;
    var total = document.getElementById('orderTotal').textContent;
    alert('订单确认成功！\n支付方式: ' + payment + '\n金额: ' + total + '\n\n即将跳转到支付页面...');
    closeOrder();
  };

  // Close modal on overlay click
  document.getElementById('orderModal').addEventListener('click', function(e) {
    if (e.target === this) closeOrder();
  });

  // Delegated click handler for buy buttons
  document.getElementById('productsGrid').addEventListener('click', function(e) {
    var btn = e.target.closest('.buy-btn');
    if (!btn) return;
    var name = btn.dataset.productName;
    var type = btn.dataset.productType;
    var monthly = parseFloat(btn.dataset.monthly) || 0;
    var yearly = parseFloat(btn.dataset.yearly) || 0;
    if (name) {
      currentOrder = { name: name, type: type, monthlyPrice: monthly, yearlyPrice: yearly };
      document.getElementById('orderProduct').textContent = name;
      document.getElementById('orderType').textContent = type.toUpperCase();
      var price = isYearly ? yearly : monthly;
      document.getElementById('orderCycle').textContent = isYearly ? '按年' : '按月';
      document.getElementById('orderUnitPrice').textContent = '¥' + price;
      document.getElementById('orderTotal').textContent = '¥' + price;
      document.getElementById('orderDiscount').textContent = '-¥0.00';
      document.getElementById('couponInput').value = '';
      document.getElementById('orderModal').classList.add('active');
    }
  });

  // Start loading
  loadProducts();
})();
</script>
</body>
</html>
