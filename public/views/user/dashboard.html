<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制台 — CloudVM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../../index.html" class="nav-brand">
        <div class="brand-icon"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
        <span class="brand-name">CloudVM<span class="brand-pro">Pro</span></span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-label">主菜单</div>
        <a class="sidebar-item active" href="dashboard.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          控制台总览
        </a>
        <a class="sidebar-item" href="instances.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          我的虚拟机
          <span class="sidebar-badge">3</span>
        </a>
        <a class="sidebar-item" href="products.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          购买产品
        </a>
        <a class="sidebar-item" href="billing.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          充值 & 账单
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">支持</div>
        <a class="sidebar-item" href="tickets.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          工单支持
          <span class="sidebar-badge" style="background:var(--orange)">1</span>
        </a>
        <a class="sidebar-item" href="announcements.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          系统公告
        </a>
        <a class="sidebar-item" href="profile.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          账号设置
        </a>
        <a class="sidebar-item" href="verify.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          实名认证
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">张</div>
        <div>
          <div class="user-name">加载中...</div>
          <div class="user-balance">余额: --</div>
        </div>
        <a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto" title="退出">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <button class="topbar-btn" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">控制台总览</span>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="ThemeManager.toggle()" title="切换主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="billing.html" class="btn-primary" style="height:36px;align-items:center;display:inline-flex">
          充值
        </a>
      </div>
    </div>

    <div class="page-content">
      <div class="page-header">
        <h1>控制台总览</h1>
        <p id="welcomeText">欢迎回来...</p>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-icon icon-blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          </div>
          <div class="stat-card-label">虚拟机实例</div>
          <div class="stat-card-value" id="statVmTotal">-</div>
          <div class="stat-card-sub" id="statVmSub">加载中...</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon icon-green">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          </div>
          <div class="stat-card-label">账户余额</div>
          <div class="stat-card-value" style="color:var(--green)" id="balanceDisplay">¥0.00</div>
          <div class="stat-card-sub">充值记录 →</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon icon-orange">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="stat-card-label">本月流量</div>
          <div class="stat-card-value" id="statTraffic">-</div>
          <div class="stat-card-sub" id="statTrafficSub">加载中...</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-icon icon-purple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="stat-card-label">待处理工单</div>
          <div class="stat-card-value" style="color:var(--orange)" id="statTickets">-</div>
          <div class="stat-card-sub"><a href="tickets.html" style="color:var(--accent)">查看详情</a></div>
        </div>
      </div>

      <!-- Charts -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px">
        <div class="card">
          <div class="card-header">
            <h3>流量使用趋势（近 30 天）</h3>
            <select style="padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg-3);font-size:12px;color:var(--text-2)">
              <option>全部实例</option><option>VM-101</option><option>VM-102</option>
            </select>
          </div>
          <div class="card-body">
            <div style="height:200px">
              <canvas id="trafficChart"></canvas>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3>实例状态</h3></div>
          <div class="card-body">
            <div style="height:160px">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- VM List -->
      <div class="card">
        <div class="card-header">
          <h3>我的虚拟机</h3>
          <a href="products.html" class="btn-sm primary">+ 购买新实例</a>
        </div>
        <div class="card-body" style="padding:0">
          <div id="vmContainer" class="vm-grid" style="padding:20px;min-height:200px">
            <div class="empty-state" style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3);display:flex;flex-direction:column;align-items:center;gap:12px">
              <div class="spinner" style="width:24px;height:24px"></div>
              <span>加载虚拟机列表中...</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Announcements preview -->
      <div class="card">
        <div class="card-header">
          <h3>最新公告</h3>
          <a href="announcements.html" class="btn-sm default">查看全部</a>
        </div>
        <div>
          <div class="ticket-item">
            <div class="ticket-priority priority-medium"></div>
            <div class="ticket-info">
              <div class="ticket-title">广州节点例行维护通知</div>
              <div class="ticket-meta"><span>2025-07-01</span><span>维护</span></div>
            </div>
            <span class="badge badge-warning">维护</span>
          </div>
          <div class="ticket-item">
            <div class="ticket-priority priority-low"></div>
            <div class="ticket-info">
              <div class="ticket-title">WebSSH 2.0 正式上线公告</div>
              <div class="ticket-meta"><span>2025-06-28</span><span>新功能</span></div>
            </div>
            <span class="badge badge-info">新功能</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/dashboard.js"></script>
<script src="../../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  ThemeManager.init();
  animateUsageBars();
  await loadDashboardData();
});

async function loadDashboardData() {
  const token = localStorage.getItem('admin_token');
  if (!token) return;

  try {
    const [meRes, vmsRes, announcesRes] = await Promise.all([
      fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } }),
      fetch('/api/vms', { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } }),
      fetch('/api/announcements', { headers: { 'Accept': 'application/json' } })
    ]);

    const me = await meRes.json();
    const vms = await vmsRes.json();
    const announces = await announcesRes.json();

    // Update user info
    if (me.success && me.data) {
      document.querySelector('.user-name').textContent = me.data.name || '用户';
      document.querySelector('.user-balance').textContent = `余额: ¥${parseFloat(me.data.balance || 0).toFixed(2)}`;
      document.querySelector('.user-avatar').textContent = (me.data.name || '用')[0];
      document.querySelector('.page-header p').textContent = `欢迎回来，${me.data.name}。您当前有 ${me.data.vm_count || 0} 台虚拟机实例。`;
    }

    // Update VM stats
    let vmList = [];
    if (vms.success) {
      vmList = vms.data || [];
      if (vms.data?.data) vmList = vms.data.data; // paginated
    }
    const running = vmList.filter(v => v.status === 'running').length;
    const stopped = vmList.filter(v => v.status === 'stopped').length;
    const total = vmList.length;

    // Update stat cards (by id, not position)
    const statVmTotal = document.getElementById('statVmTotal');
    const statVmSub = document.getElementById('statVmSub');
    if (statVmTotal) statVmTotal.textContent = total;
    if (statVmSub) statVmSub.textContent = `${running} 运行中 · ${stopped} 已停止`;

    // Traffic: sum from all VMs
    const totalTraffic = vmList.reduce((s, v) => s + (v.traffic_used || 0), 0);
    const totalTrafficLimit = vmList.reduce((s, v) => s + (v.traffic_limit || v.traffic || 1000), 0);
    document.getElementById('statTraffic') && (document.getElementById('statTraffic').textContent = totalTraffic + ' GB');
    document.getElementById('statTrafficSub') && (document.getElementById('statTrafficSub').textContent = '配额: ' + totalTrafficLimit + ' GB');

    // Update sidebar badge
    document.querySelector('.sidebar-badge').textContent = total;

    // Status chart
    CloudVMCharts.createDoughnutChart(
      document.getElementById('statusChart').getContext('2d'),
      ['运行中', '已停止'],
      [running || 1, stopped || 0],
      ['rgba(22,163,74,0.8)', 'rgba(220,38,38,0.7)']
    );

    // Traffic chart (use placeholder if no real data)
    const labels = Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);return `${d.getMonth()+1}/${d.getDate()}`;});
    CloudVMCharts.createLineChart(
      document.getElementById('trafficChart').getContext('2d'), labels,
      [{ label:'流量(GB)', data: Array(30).fill(0), backgroundColor:'rgba(37,99,235,0.08)', borderColor:'rgba(37,99,235,0.8)' }]
    );

    // Render VM cards
    renderVmCards(vmList);

    // Render announcements
    renderAnnouncements(announces.success ? (announces.data || []) : []);
  } catch(e) {
    console.error('Dashboard data load failed', e);
  }
}

function renderVmCards(vms) {
  const container = document.getElementById('vmContainer');
  if (!container) return;
  if (!vms.length) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-3)">暂无虚拟机实例。<br><br><a href="products.html" class="btn primary">立即购买</a></div>';
    return;
  }
  container.innerHTML = vms.slice(0, 6).map(vm => {
    const isRunning = vm.status === 'running';
    const expires = vm.expires_at ? new Date(vm.expires_at).toLocaleDateString('zh-CN') : '-';
    const created = new Date(vm.created_at).toLocaleDateString('zh-CN');
    const progress = vm.traffic_used ? Math.min(100, Math.round((vm.traffic_used / (vm.traffic || 1000)) * 100)) : 0;
    return `<div class="vm-card">
      <div class="vm-card-header">
        <div class="vm-card-info">
          <h3 class="vm-name">${vm.name || `VM #${vm.id}`}</h3>
          <span class="badge ${isRunning ? 'badge-success' : 'badge-error'}">${isRunning ? '运行中' : '已停止'}</span>
        </div>
        <div class="vm-card-type">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          ${vm.type || 'KVM'}
        </div>
      </div>
      <div class="vm-card-specs">
        <span class="spec-item">${vm.cpu} vCPU</span>
        <span class="spec-item">${vm.memory} MB</span>
        <span class="spec-item">${vm.disk} GB</span>
        <span class="spec-item">${vm.ipv4 || 'NAT'}</span>
      </div>
      <div class="vm-card-traffic">
        <div class="traffic-header"><span>本月流量</span><span>${vm.traffic_used || 0} GB / ${vm.traffic || 1000} GB</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="vm-card-footer">
        <div class="vm-meta">
          <span>创建: ${created}</span>
          <span>到期: ${expires}</span>
        </div>
        <div class="vm-card-actions">
          <button class="btn-sm primary" onclick="window.location.href='instance-detail.html?id=${vm.id}'">管理</button>
          <button class="btn-sm ${isRunning ? 'danger' : 'success'}" onclick="VMOperations.perform(${vm.id},'${isRunning ? 'stop' : 'start'}','${isRunning ? '关机' : '开机'}')">${isRunning ? '关机' : '开机'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAnnouncements(list) {
  const container = document.querySelector('.announcements-list') || document.getElementById('announceList');
  if (!container) return;
  if (!list.length) {
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-3)">暂无公告</div>';
    return;
  }
  container.innerHTML = list.slice(0, 3).map(a => `
    <div class="announcement-item">
      <div class="announcement-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <div class="announcement-content">
        <div class="announcement-title">${a.title}</div>
        <div class="announcement-text">${a.content || a.body || ''}</div>
        <div class="announcement-date">${new Date(a.created_at || a.published_at).toLocaleDateString('zh-CN')}</div>
      </div>
    </div>
  `).join('');
}

function renewVM(id) {
  window.location.href = `billing.html?renew=${id}`;
}
</script>
</body>
</html>
