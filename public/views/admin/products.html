<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品管理 — CloudVM Pro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<link rel="stylesheet" href="../../css/admin.css">
<style>
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
.product-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: var(--transition); }
.product-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(234,88,12,0.08); }
.product-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.product-type-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.product-type-badge.kvm { background: rgba(37,99,235,0.1); color: #2563eb; }
.product-type-badge.lxc { background: rgba(22,163,74,0.1); color: #16a34a; }
.product-price { font-size: 28px; font-weight: 800; color: var(--orange); margin-bottom: 4px; }
.product-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
.spec-item { font-size: 13px; color: var(--text-2); }
.spec-value { font-weight: 600; color: var(--text); }
.product-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <div class="nav-brand">
        <div class="brand-icon" style="background:var(--orange)"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
        <span class="brand-name">CloudVM<span class="brand-pro" style="color:var(--orange)">管理</span></span>
      </div>
      <span class="admin-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section"><a class="sidebar-item" href="index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">业务管理</div>
        <a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a>
        <a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a>
        <a class="sidebar-item active" href="products.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a>
        <a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a>
        <a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div>
        <a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a>
        <a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div>
        <div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div>
        <a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">产品管理</span></div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="btn-sm primary" onclick="openProductModal()">+ 添加产品</button>
      </div>
    </div>

    <div class="admin-page">
      <div style="margin-bottom:24px">
        <h1 style="font-size:22px;margin-bottom:4px">产品管理</h1>
        <p style="font-size:14px;color:var(--text-3)">管理所有可销售的虚拟机产品方案</p>
      </div>

      <div class="product-grid" id="productGrid">
        <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-3)"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px"></div>加载产品数据...</div>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal" style="display:none">
<div class="modal-content" style="max-width:600px">
  <div class="modal-header"><h2 id="productModalTitle">添加产品</h2><button class="modal-close" onclick="closeModal('productModal')">&times;</button></div>
  <div class="modal-body" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <input type="hidden" id="editProductId">
    <div class="form-group" style="grid-column:1/-1"><label>产品名称 *</label><input class="form-input" id="prodName" placeholder="例如：KVM 标准版"></div>
    <div class="form-group"><label>类型</label><select class="form-input" id="prodType"><option value="kvm">KVM 虚拟机</option><option value="lxc">LXC 容器</option></select></div>
    <div class="form-group"><label>状态</label><select class="form-input" id="prodStatus"><option value="active">上架</option><option value="inactive">下架</option></select></div>
    <div class="form-group" style="grid-column:1/-1"><label>关联节点</label><select class="form-input" id="prodNodeId" onchange="onNodeChange()"><option value="">— 请选择节点 —</option></select></div>
    <div class="form-group" style="grid-column:1/-1"><label>系统镜像 / 模板</label><select class="form-input" id="prodTemplateId"><option value="">— 请先选择节点 —</option></select></div>
    <div class="form-group"><label>CPU 核心</label><input class="form-input" id="prodCpu" type="number" min="1"></div>
    <div class="form-group"><label>内存 (MB)</label><input class="form-input" id="prodMemory" type="number" min="128"></div>
    <div class="form-group"><label>磁盘 (GB)</label><input class="form-input" id="prodDisk" type="number" min="1"></div>
    <div class="form-group"><label>带宽 (Mbps)</label><input class="form-input" id="prodBandwidth" type="number" min="1"></div>
    <div class="form-group"><label>月付价格 (¥)</label><input class="form-input" id="prodMonthly" type="number" step="0.01"></div>
    <div class="form-group"><label>年付价格 (¥)</label><input class="form-input" id="prodYearly" type="number" step="0.01"></div>
    <div class="form-group"><label>流量限制 (GB)</label><input class="form-input" id="prodTraffic" type="number"></div>
    <div class="form-group"><label>库存 (-1=无限)</label><input class="form-input" id="prodStock" type="number" value="-1"></div>
    <div class="form-group" style="grid-column:1/-1"><label>描述</label><textarea class="form-input" id="prodDesc" rows="3"></textarea></div>
  </div>
  <div class="modal-footer">
    <span id="prodModalMsg" style="color:var(--red);font-size:13px;margin-right:auto"></span>
    <button class="btn default" onclick="closeModal('productModal')">取消</button>
    <button class="btn primary" id="prodSaveBtn" onclick="saveProduct()">保存</button>
  </div>
</div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';
  window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    const res = await API.getProducts();
    if (!res.success) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--red)">加载失败: ' + (res.message||'') + '</div>';
      return;
    }
    const products = res.data.products || [];
    if (products.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text-3)">暂无产品，点击"添加产品"开始</div>';
      return;
    }
    grid.innerHTML = products.map(p =>
      '<div class="product-card" id="prod-'+p.id+'">' +
      '<div class="product-card-header">' +
        '<div><h3 style="font-size:16px;margin-bottom:4px">' + esc(p.name) + '</h3>' +
        (p.status === 'inactive' ? '<span style="font-size:11px;color:var(--text-3)">已下架</span>' : '') +
        (p.node_name ? '<div style="font-size:11px;color:var(--text-2);margin-top:2px">节点: ' + esc(p.node_name) + '</div>' : '') + '</div>' +
        '<span class="product-type-badge ' + p.type + '">' + (p.type==='kvm'?'KVM':'LXC') + '</span>' +
      '</div>' +
      '<div class="product-price">' + UI.formatMoney(p.monthly_price) + '<span style="font-size:14px;font-weight:400;color:var(--text-3)"> /月</span></div>' +
      (p.yearly_price ? '<div style="font-size:13px;color:var(--text-2)">' + UI.formatMoney(p.yearly_price) + ' /年</div>' : '') +
      '<div class="product-specs">' +
        '<div><span class="spec-item">CPU</span><span class="spec-value"> ' + p.cpu + ' 核</span></div>' +
        '<div><span class="spec-item">内存</span><span class="spec-value"> ' + (p.memory>=1024?(p.memory/1024).toFixed(1)+'G':p.memory+'M') + '</span></div>' +
        '<div><span class="spec-item">磁盘</span><span class="spec-value"> ' + p.disk + 'G</span></div>' +
        '<div><span class="spec-item">带宽</span><span class="spec-value"> ' + p.bandwidth + 'M</span></div>' +
        (p.template_name ? '<div style="grid-column:1/-1"><span class="spec-item">镜像</span><span class="spec-value" style="font-size:11px"> ' + esc(p.template_name) + '</span></div>' : '') +
      '</div>' +
      (p.description ? '<p style="font-size:12px;color:var(--text-3);margin-bottom:8px">' + esc(p.description).substring(0,60) + '</p>' : '') +
      '<div class="product-actions">' +
        '<button class="btn-sm default" onclick="editProduct(' + p.id + ')">编辑</button>' +
        '<button class="btn-sm default" onclick="toggleProdStatus(' + p.id + ')">' + (p.status==='active'?'下架':'上架') + '</button>' +
        '<button class="btn-sm danger" onclick="deleteProduct(' + p.id + ')">删除</button>' +
      '</div></div>'
    ).join('');
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  window.openProductModal = async function(id) {
    document.getElementById('editProductId').value = id || '';
    document.getElementById('productModalTitle').textContent = id ? '编辑产品' : '添加产品';
    document.getElementById('prodModalMsg').textContent = '';
    // Load node list
    await loadNodeOptions();
    if (!id) {
      ['prodName','prodDesc'].forEach(f => document.getElementById(f).value='');
      document.getElementById('prodType').value = 'kvm';
      document.getElementById('prodStatus').value = 'active';
      document.getElementById('prodNodeId').value = '';
      document.getElementById('prodTemplateId').innerHTML = '<option value="">— 请先选择节点 —</option>';
      document.getElementById('prodCpu').value = 1;
      document.getElementById('prodMemory').value = 1024;
      document.getElementById('prodDisk').value = 20;
      document.getElementById('prodBandwidth').value = 10;
      document.getElementById('prodTraffic').value = 500;
      document.getElementById('prodMonthly').value = 29;
      document.getElementById('prodYearly').value = 290;
      document.getElementById('prodStock').value = -1;
    }
    document.getElementById('productModal').style.display = 'flex';
  };

  window.editProduct = async function(id) {
    const res = await API.getProduct(id);
    if (!res.success) { UI.notify(res.message,'error'); return; }
    const p = res.data.product;
    document.getElementById('editProductId').value = p.id;
    document.getElementById('prodName').value = p.name || '';
    document.getElementById('prodType').value = p.type || 'kvm';
    document.getElementById('prodStatus').value = p.status || 'active';
    document.getElementById('prodCpu').value = p.cpu || 1;
    document.getElementById('prodMemory').value = p.memory || 1024;
    document.getElementById('prodDisk').value = p.disk || 20;
    document.getElementById('prodBandwidth').value = p.bandwidth || 10;
    document.getElementById('prodTraffic').value = p.traffic || 500;
    document.getElementById('prodMonthly').value = p.monthly_price || 0;
    document.getElementById('prodYearly').value = p.yearly_price || 0;
    document.getElementById('prodStock').value = p.stock !== undefined ? p.stock : -1;
    document.getElementById('prodDesc').value = p.description || '';
    // Set node and templates
    document.getElementById('prodNodeId').value = p.node_id || '';
    if (p.node_id) { await loadTemplatesForNode(p.node_id, p.template_id); }
    openProductModal(p.id);
  };

  window.saveProduct = async function() {
    const id = document.getElementById('editProductId').value;
    const data = {
      name: document.getElementById('prodName').value.trim(),
      type: document.getElementById('prodType').value,
      status: document.getElementById('prodStatus').value,
      node_id: document.getElementById('prodNodeId').value || null,
      template_id: document.getElementById('prodTemplateId').value || null,
      cpu: parseInt(document.getElementById('prodCpu').value) || 1,
      memory: parseInt(document.getElementById('prodMemory').value) || 1024,
      disk: parseInt(document.getElementById('prodDisk').value) || 20,
      bandwidth: parseInt(document.getElementById('prodBandwidth').value) || 10,
      traffic: parseInt(document.getElementById('prodTraffic').value) || 0,
      monthly_price: parseFloat(document.getElementById('prodMonthly').value) || 0,
      yearly_price: parseFloat(document.getElementById('prodYearly').value) || 0,
      stock: parseInt(document.getElementById('prodStock').value),
      description: document.getElementById('prodDesc').value.trim(),
    };
    if (!data.name) { document.getElementById('prodModalMsg').textContent = '请输入产品名称'; return; }

    document.getElementById('prodSaveBtn').disabled = true;
    const res = id ? await API.updateProduct(id, data) : await API.createProduct(data);
    document.getElementById('prodSaveBtn').disabled = false;

    if (res.success) {
      UI.notify(id ? '产品已更新' : '产品已创建', 'success');
      document.getElementById('productModal').style.display = 'none';
      loadProducts();
    } else {
      document.getElementById('prodModalMsg').textContent = res.message || '保存失败';
    }
  };

  window.toggleProdStatus = async function(id) {
    const res = await API.toggleProductStatus(id);
    if (res.success) {
      UI.notify('产品状态已切换', 'success');
      loadProducts();
    } else { UI.notify(res.message,'error'); }
  };

  window.deleteProduct = async function(id) {
    if (!confirm('确定要删除此产品吗？')) return;
    const res = await API.deleteProduct(id);
    if (res.success) { UI.notify('产品已删除', 'success'); loadProducts(); }
    else { UI.notify(res.message,'error'); }
  };

  // ===== Node-Template Linkage =====
  async function loadNodeOptions() {
    const sel = document.getElementById('prodNodeId');
    const curVal = sel.value;
    sel.innerHTML = '<option value="">— 加载中 —</option>';
    const res = await API.getNodes();
    if (res.success && res.data.nodes) {
      sel.innerHTML = '<option value="">— 请选择节点 —</option>' +
        res.data.nodes.map(n => '<option value="' + n.id + '"' + (n.id == curVal ? ' selected' : '') + '>' + esc(n.name) + ' (' + esc(n.host) + ')</option>').join('');
    } else {
      sel.innerHTML = '<option value="">— 加载失败 —</option>';
    }
  }

  window.onNodeChange = async function() {
    const nodeId = document.getElementById('prodNodeId').value;
    await loadTemplatesForNode(nodeId);
  };

  async function loadTemplatesForNode(nodeId, selectedTemplateId) {
    const sel = document.getElementById('prodTemplateId');
    if (!nodeId) {
      sel.innerHTML = '<option value="">— 请先选择节点 —</option>';
      return;
    }
    sel.innerHTML = '<option value="">— 加载中 —</option>';
    const res = await API.getNodeTemplates(nodeId);
    if (res.success && res.data.templates) {
      const tmpls = res.data.templates || [];
      if (tmpls.length === 0) {
        sel.innerHTML = '<option value="">— 该节点暂无镜像，请先同步 —</option>';
      } else {
        sel.innerHTML = '<option value="">— 选择镜像 —</option>' +
          tmpls.map(t => '<option value="' + t.template_id + '"' + (t.template_id == selectedTemplateId ? ' selected' : '') + '>' +
            (t.type === 'lxc' ? '[LXC] ' : '[KVM] ') + esc(t.name) + (t.size ? ' (' + (t.size / 1024 / 1024 / 1024).toFixed(1) + 'G)' : '') + '</option>').join('');
      }
    } else {
      sel.innerHTML = '<option value="">— 加载失败 —</option>';
    }
  }

  loadProducts();
})();
</script>
</body>
</html>
