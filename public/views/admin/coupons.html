      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">业务管理</div><a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a><a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a><a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a><a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a><a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">财务</div><a class="sidebar-item active" href="coupons.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>优惠码 & 代金券</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div><a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a><a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a></div>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div><div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div><a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div></div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar"><button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">优惠码管理</span></div><div style="margin-left:auto"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><button class="btn-sm primary" onclick="openModal()">+ 创建优惠码</button></div></div>

    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">优惠码管理</h1><p style="font-size:14px;color:var(--text-3)">管理优惠码和代金券，支持固定金额、百分比折扣</p></div>
      <div class="table-wrapper">
        <table class="data-table"><thead><tr><th>优惠码</th><th>类型</th><th>面值</th><th>使用/限制</th><th>最低消费</th><th>有效期</th><th>状态</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none"><div class="modal-content" style="max-width:550px">
  <div class="modal-header"><h2 id="modalTitle">创建优惠码</h2><button class="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</button></div>
  <div class="modal-body" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <input type="hidden" id="editId">
    <div class="form-group"><label>优惠码 *</label><input class="form-input" id="code" placeholder="例如：NEWUSER2025"></div>
    <div class="form-group"><label>类型</label><select class="form-input" id="cType"><option value="fixed">固定金额</option><option value="percentage">百分比折扣</option></select></div>
    <div class="form-group"><label>面值 *</label><input class="form-input" id="value" type="number" step="0.01" placeholder="固定金额¥或百分比%"></div>
    <div class="form-group"><label>最低消费</label><input class="form-input" id="minAmount" type="number" step="0.01" value="0"></div>
    <div class="form-group"><label>使用次数上限</label><input class="form-input" id="maxUses" type="number" value="100"></div>
    <div class="form-group"><label>每人限用</label><input class="form-input" id="maxPerUser" type="number" value="1"></div>
    <div class="form-group"><label>开始日期</label><input class="form-input" id="startsAt" type="date"></div>
    <div class="form-group"><label>结束日期</label><input class="form-input" id="expiresAt" type="date"></div>
  </div>
  <div class="modal-footer"><span id="msg" style="color:var(--red);font-size:13px;margin-right:auto"></span><button class="btn default" onclick="document.getElementById('modal').style.display='none'">取消</button><button class="btn primary" id="saveBtn" onclick="save()">保存</button></div>
</div></div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  async function load() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';
    const res = await API.getCoupons();
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--red)">加载失败</td></tr>'; return; }
    const items = res.data.coupons || res.data || [];
    if (items.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-3)">暂无优惠码</td></tr>'; return; }

    tbody.innerHTML = items.map(c => '<tr>' +
      '<td style="font-family:var(--mono);font-weight:600;font-size:14px">' + esc(c.code) + '</td>' +
      '<td>' + (c.type === 'fixed' ? '💰 固定金额' : '📊 百分比') + '</td>' +
      '<td style="font-weight:600">' + (c.type === 'fixed' ? UI.formatMoney(c.value) : c.value + '%') + '</td>' +
      '<td>' + (c.used_count||0) + ' / ' + (c.max_uses||'∞') + '</td>' +
      '<td>' + (c.min_amount > 0 ? UI.formatMoney(c.min_amount) : '无限制') + '</td>' +
      '<td style="font-size:12px">' + (c.expires_at ? '至 ' + c.expires_at : '永久') + '</td>' +
      '<td>' + UI.statusBadge(c.status||'active', {active:['success','启用'],inactive:['default','停用']}) + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      '<button class="btn-sm default" onclick="toggleStatus('+c.id+')" style="font-size:11px">'+(c.status==='active'?'停用':'启用')+'</button>' +
      '<button class="btn-sm danger" onclick="del('+c.id+')" style="font-size:11px">删除</button></div></td></tr>').join('');
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') : ''; }

  window.openModal = function() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = '创建优惠码';
    ['code','value','minAmount','maxUses','maxPerUser','startsAt','expiresAt'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('cType').value = 'fixed';
    document.getElementById('maxUses').value = '100';
    document.getElementById('maxPerUser').value = '1';
    document.getElementById('msg').textContent = '';
    document.getElementById('modal').style.display = 'flex';
  };

  window.save = async function() {
    const data = {
      code: document.getElementById('code').value.trim(),
      type: document.getElementById('cType').value,
      value: parseFloat(document.getElementById('value').value) || 0,
      min_amount: parseFloat(document.getElementById('minAmount').value) || 0,
      max_uses: parseInt(document.getElementById('maxUses').value) || 100,
      max_per_user: parseInt(document.getElementById('maxPerUser').value) || 1,
      starts_at: document.getElementById('startsAt').value || null,
      expires_at: document.getElementById('expiresAt').value || null,
    };
    if (!data.code || !data.value) { document.getElementById('msg').textContent = '请填写优惠码和面值'; return; }
    document.getElementById('saveBtn').disabled = true;
    const res = await API.createCoupon(data);
    document.getElementById('saveBtn').disabled = false;
    if (res.success) { document.getElementById('modal').style.display = 'none'; UI.notify('已创建','success'); load(); }
    else document.getElementById('msg').textContent = res.message;
  };

  window.toggleStatus = async function(id) { const r = await API.toggleCouponStatus(id); if (r.success) { UI.notify('已切换','success'); load(); } else UI.notify(r.message,'error'); };
  window.del = async function(id) { if (!confirm('确定删除？')) return; const r = await API.deleteCoupon(id); if (r.success) { UI.notify('已删除','success'); load(); } else UI.notify(r.message,'error'); };

  load();
})();
</script>
</body>
</html>
