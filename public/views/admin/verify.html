    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">实名认证审核</h1><p style="font-size:14px;color:var(--text-3)">审核用户提交的实名认证申请</p></div>
      <div class="table-wrapper">
        <table class="data-table"><thead><tr><th>用户</th><th>真实姓名</th><th>身份证号</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  async function load() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';
    const res = await API.getVerifications();
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">加载失败</td></tr>'; return; }
    const items = res.data.verifications || res.data || [];
    if (items.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3)">暂无认证申请</td></tr>'; return; }

    const statusMap = { pending: ['warning', '待审核'], approved: ['success', '已通过'], rejected: ['danger', '已驳回'] };
    tbody.innerHTML = items.map(v =>
      '<tr><td>' + esc(v.user ? v.user.name : '#') + '</td>' +
      '<td>' + esc(v.real_name || v.name) + '</td>' +
      '<td style="font-family:var(--mono);font-size:12px">' + esc(v.id_number || v.id_card || v.card_number || '***') + '</td>' +
      '<td>' + UI.statusBadge(v.status||'pending', statusMap) + '</td>' +
      '<td style="font-size:12px">' + UI.formatDate(v.created_at) + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      (v.status === 'pending'
        ? '<button class="btn-sm primary" onclick="approve('+v.id+')" style="font-size:11px">✅ 通过</button><button class="btn-sm danger" onclick="reject('+v.id+')" style="font-size:11px">❌ 驳回</button>'
        : '已处理') +
      '</div></td></tr>').join('');
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') : ''; }

  window.approve = async function(id) {
    if (!confirm('确认通过此认证申请？')) return;
    const r = await API.approveVerification(id);
    if (r.success) { UI.notify('已通过','success'); load(); } else UI.notify(r.message,'error');
  };

  window.reject = async function(id) {
    if (!confirm('确认驳回此认证申请？')) return;
    const r = await API.rejectVerification(id);
    if (r.success) { UI.notify('已驳回','success'); load(); } else UI.notify(r.message,'error');
  };

  load();
})();
</script>
