      <div class="sidebar-section"><div class="sidebar-section-label">业务管理</div>
        <a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a>
        <a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a>

        <a class="sidebar-item active" href="orders.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a>

  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">订单管理</span></div>
      <div style="margin-left:auto"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
    </div>
    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">订单管理</h1><p style="font-size:14px;color:var(--text-3)">管理所有订单，支持搜索、筛选、标记支付、退款</p></div>

      <div class="table-wrapper">
        <div class="table-header">
          <div style="display:flex;gap:12px;align-items:center">
            <input class="form-input" id="orderSearch" placeholder="搜索订单号/用户名..." style="width:220px" onkeyup="debounceSearch()">
            <select class="form-input" id="orderStatus" onchange="loadOrders(1)" style="width:120px">
              <option value="">全部状态</option><option value="pending">待支付</option><option value="paid">已支付</option><option value="refunded">已退款</option><option value="failed">失败</option>
            </select>
          </div>
          <span id="orderCount" style="font-size:13px;color:var(--text-3)"></span>
        </div>
        <table class="data-table"><thead><tr><th>订单号</th><th>用户</th><th>产品</th><th>金额</th><th>支付方式</th><th>周期</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody id="orderTableBody"><tr><td colspan="9" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr></tbody>
        </table>
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:16px" id="orderPagination"></div>
      </div>
    </div>
  </div>
</div>
<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  let currentPage = 1, searchTimer = null;
  window.debounceSearch = function() { clearTimeout(searchTimer); searchTimer = setTimeout(() => loadOrders(1), 300); };

  async function loadOrders(page) {
    currentPage = page || currentPage;
    const params = {
      page: currentPage,
      search: document.getElementById('orderSearch').value.trim(),
      status: document.getElementById('orderStatus').value,
    };
    const tbody = document.getElementById('orderTableBody');
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';

    const res = await API.getOrders(params);
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--red)">加载失败: '+(res.message||'')+'</td></tr>'; return; }

    const orders = res.data || [];
    const meta = res.meta || {};
    document.getElementById('orderCount').textContent = '共 ' + (meta.total||0) + ' 条';

    if (orders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-3)">暂无订单数据</td></tr>';
      document.getElementById('orderPagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = orders.map(o => {
      const actions = [];
      const status = o.payment_status || o.status;
      if (status === 'pending') {
        actions.push('<button class="btn-sm primary" onclick="markPaid('+o.id+')" style="font-size:11px">标记支付</button>');
      }
      if (status === 'paid') {
        actions.push('<button class="btn-sm warning" onclick="refundOrder('+o.id+')" style="font-size:11px">退款</button>');
      }

      return '<tr><td style="font-family:var(--mono);font-size:12px">' + esc(o.order_no || '#'+o.id) + '</td>' +
        '<td>' + esc(o.user ? o.user.name : '-') + '</td>' +
        '<td>' + esc(o.product ? o.product.name : '-') + '</td>' +
        '<td style="font-family:var(--mono);font-weight:600">' + UI.formatMoney(o.amount) + '</td>' +
        '<td style="font-size:12px">' + (o.payment_method||'-') + '</td>' +
        '<td style="font-size:12px">' + (o.billing_cycle==='yearly'?'年付':'月付') + '</td>' +
        '<td>' + UI.statusBadge(status) + '</td>' +
        '<td style="font-size:12px">' + UI.formatDate(o.created_at) + '</td>' +
        '<td><div style="display:flex;gap:4px">' + actions.join('') + '</div></td></tr>';
    }).join('');

    const pagDiv = document.getElementById('orderPagination');
    if (meta.last_page <= 1) { pagDiv.innerHTML = ''; return; }
    pagDiv.innerHTML = '<button class="btn-sm default" onclick="loadOrders('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>上一页</button>' +
      '<span style="font-size:13px;color:var(--text-2)">第 '+currentPage+' / '+meta.last_page+' 页</span>' +
      '<button class="btn-sm default" onclick="loadOrders('+(currentPage+1)+')" '+(currentPage>=meta.last_page?'disabled':'')+'>下一页</button>';
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  window.markPaid = async function(id) {
    const txnId = prompt('请输入交易流水号（留空自动生成）:');
    const res = await API.markPaid(id, txnId ? { transaction_id: txnId } : {});
    if (res.success) { UI.notify('已标记为已支付','success'); loadOrders(currentPage); }
    else UI.notify(res.message||'操作失败','error');
  };

  window.refundOrder = async function(id) {
    if (!confirm('确定要退款此订单吗？金额将退回到用户余额。')) return;
    const res = await API.refundOrder(id);
    if (res.success) { UI.notify('退款成功','success'); loadOrders(currentPage); }
    else UI.notify(res.message||'退款失败','error');
  };

  loadOrders(1);
})();
</script>
</body>
</html>
