<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统配置 — CloudVM Pro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<link rel="stylesheet" href="../../css/admin.css">
<style>
.settings-tabs { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
.settings-tab { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-2); cursor: pointer; font-size: 13px; transition: var(--transition); }
.settings-tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }
.settings-panel { display: none; }
.settings-panel.active { display: block; }
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header"><div class="nav-brand"><div class="brand-icon" style="background:var(--orange)"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div><span class="brand-name">CloudVM<span class="brand-pro" style="color:var(--orange)">管理</span></span></div><span class="admin-badge">Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section"><a class="sidebar-item" href="index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">业务管理</div><a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a><a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a><a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a><a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a><a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div><a class="sidebar-item active" href="settings.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a><a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a></div>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div><div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div><a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div></div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar"><button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">系统配置</span></div><div style="margin-left:auto"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div></div>

    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">系统配置</h1><p style="font-size:14px;color:var(--text-3)">配置支付、邮件、站点基础参数</p></div>

      <div class="settings-tabs">
        <button class="settings-tab active" onclick="switchTab('general')">站点设置</button>
        <button class="settings-tab" onclick="switchTab('payment')">支付配置</button>
        <button class="settings-tab" onclick="switchTab('smtp')">邮件 SMTP</button>
      </div>

      <div id="panel-general" class="table-wrapper settings-panel active">
        <div class="table-header"><h3>站点基础设置</h3></div>
        <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group"><label>站点名称</label><input class="form-input" id="siteName"></div>
          <div class="form-group"><label>站点 URL</label><input class="form-input" id="siteUrl"></div>
          <div class="form-group" style="grid-column:1/-1"><label>站点描述</label><textarea class="form-input" id="siteDesc" rows="2"></textarea></div>
        </div>
      </div>

      <div id="panel-payment" class="table-wrapper settings-panel">
        <div class="table-header"><h3>易支付配置</h3></div>
        <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group"><label>API 地址</label><input class="form-input" id="epayUrl"></div>
          <div class="form-group"><label>商户 ID</label><input class="form-input" id="epayPid"></div>
          <div class="form-group" style="grid-column:1/-1"><label>商户密钥</label><input class="form-input" id="epayKey" type="password"></div>
          <div style="grid-column:1/-1"><button class="btn primary" onclick="testEpay()">🔗 测试支付接口</button><span id="epayResult" style="margin-left:12px;font-size:13px"></span></div>
        </div>
      </div>

      <div id="panel-smtp" class="table-wrapper settings-panel">
        <div class="table-header"><h3>邮件 SMTP 配置</h3></div>
        <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group"><label>SMTP 主机</label><input class="form-input" id="smtpHost"></div>
          <div class="form-group"><label>端口</label><input class="form-input" id="smtpPort" type="number"></div>
          <div class="form-group"><label>发件邮箱</label><input class="form-input" id="smtpUser"></div>
          <div class="form-group"><label>密码</label><input class="form-input" id="smtpPass" type="password"></div>
          <div class="form-group"><label>加密方式</label><select class="form-input" id="smtpEncryption"><option value="ssl">SSL</option><option value="tls">TLS</option></select></div>
          <div class="form-group"><label>发件人名称</label><input class="form-input" id="smtpFromName"></div>
          <div style="grid-column:1/-1"><button class="btn primary" onclick="testSmtp()">📧 发送测试邮件</button><span id="smtpResult" style="margin-left:12px;font-size:13px"></span></div>
        </div>
      </div>

      <div style="margin-top:24px;text-align:right">
        <button class="btn primary" onclick="saveAll()">💾 保存所有配置</button>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  window.switchTab = function(tab) {
    document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-'+tab).classList.add('active');
  };

  // Load existing settings
  async function loadSettings() {
    const groups = ['general', 'payment', 'smtp'];
    for (const g of groups) {
      const res = await API.getSettings(g);
      if (res.success && res.data) {
        const d = res.data.settings || res.data;
        if (g === 'general') {
          document.getElementById('siteName').value = d.site_name || '';
          document.getElementById('siteUrl').value = d.site_url || '';
          document.getElementById('siteDesc').value = d.site_description || '';
        } else if (g === 'payment') {
          document.getElementById('epayUrl').value = d.api_url || d.epay_url || '';
          document.getElementById('epayPid').value = d.pid || d.epay_pid || '';
          document.getElementById('epayKey').value = d.key || d.epay_key || '';
        } else if (g === 'smtp') {
          document.getElementById('smtpHost').value = d.mail_host || d.host || '';
          document.getElementById('smtpPort').value = d.mail_port || d.port || 465;
          document.getElementById('smtpUser').value = d.mail_username || d.username || '';
          document.getElementById('smtpPass').value = d.mail_password || '';
          document.getElementById('smtpEncryption').value = d.mail_encryption || 'ssl';
          document.getElementById('smtpFromName').value = d.mail_from_name || d.from_name || '';
        }
      }
    }
  }

  window.saveAll = async function() {
    const configs = {
      general: {
        site_name: document.getElementById('siteName').value,
        site_url: document.getElementById('siteUrl').value,
        site_description: document.getElementById('siteDesc').value,
      },
      payment: {
        api_url: document.getElementById('epayUrl').value,
        pid: document.getElementById('epayPid').value,
        key: document.getElementById('epayKey').value,
      },
      smtp: {
        mail_host: document.getElementById('smtpHost').value,
        mail_port: document.getElementById('smtpPort').value,
        mail_username: document.getElementById('smtpUser').value,
        mail_password: document.getElementById('smtpPass').value,
        mail_encryption: document.getElementById('smtpEncryption').value,
        mail_from_name: document.getElementById('smtpFromName').value,
      }
    };

    let ok = true;
    for (const [group, data] of Object.entries(configs)) {
      const res = await API.updateSettings(group, data);
      if (!res.success) { UI.notify(group + ' 保存失败: ' + res.message, 'error'); ok = false; }
    }
    if (ok) UI.notify('所有配置已保存', 'success');
  };

  window.testEpay = async function() {
    document.getElementById('epayResult').textContent = '测试中...';
    const res = await API.testEpay({});
    document.getElementById('epayResult').textContent = res.success ? '✅ ' + (res.message||'连接成功') : '❌ ' + (res.message||'失败');
    document.getElementById('epayResult').style.color = res.success ? 'var(--green)' : 'var(--red)';
  };

  window.testSmtp = async function() {
    document.getElementById('smtpResult').textContent = '发送中...';
    const res = await API.testSmtp({ to: user?.email || 'admin@example.com' });
    document.getElementById('smtpResult').textContent = res.success ? '✅ ' + (res.message||'发送成功') : '❌ ' + (res.message||'失败');
    document.getElementById('smtpResult').style.color = res.success ? 'var(--green)' : 'var(--red)';
  };

  loadSettings();
})();
</script>
</body>
</html>
