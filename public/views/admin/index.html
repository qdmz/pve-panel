<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 — CloudVM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<link rel="stylesheet" href="../../css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <div class="nav-brand">
        <div class="brand-icon" style="background:var(--orange)"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
        <span class="brand-name">CloudVM<span class="brand-pro" style="color:var(--orange)">管理</span></span>
      </div>
      <span class="admin-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <a class="sidebar-item active" href="index.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">节点管理</div>
        <a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">业务管理</div>
        <a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a>
        <a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a>
        <a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a>
        <a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a>
        <a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理<span class="sidebar-badge" id="ticketCount">0</span></a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">财务</div>
        <a class="sidebar-item" href="coupons.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>优惠码 & 代金券</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">系统</div>
        <a class="sidebar-item" href="verify.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>实名认证审核</a>
        <a class="sidebar-item" href="announcements.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>公告管理</a>
        <a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a>
        <a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="sidebarUser">
        <div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div>
        <div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div>
        <a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto" title="退出登录"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><span class="breadcrumb-current">数据总览</span></div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <span id="headerTime" style="font-size:12px;color:var(--text-3)"></span>
        <button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="btn-sm default" onclick="API.Auth.logout()" style="font-size:12px">退出</button>
      </div>
    </div>

    <div class="admin-page">
      <div style="margin-bottom:24px">
        <h1 style="font-size:22px;margin-bottom:4px">数据总览</h1>
        <p style="font-size:14px;color:var(--text-3)" id="welcomeMsg">加载中...</p>
      </div>

      <!-- Overview Stats -->
      <div class="overview-grid" id="statCards">
        <div class="overview-card"><div class="ov-icon">👤</div><div class="ov-label">注册用户</div><div class="ov-value" id="statUsers">-</div><div class="ov-change">加载中...</div></div>
        <div class="overview-card green"><div class="ov-icon">💻</div><div class="ov-label">虚拟机实例</div><div class="ov-value" id="statVms">-</div><div class="ov-change">加载中...</div></div>
        <div class="overview-card orange"><div class="ov-icon">💰</div><div class="ov-label">本月收入</div><div class="ov-value" id="statRevenue">-</div><div class="ov-change">加载中...</div></div>
        <div class="overview-card purple"><div class="ov-icon">🎫</div><div class="ov-label">待处理工单</div><div class="ov-value" id="statTickets">-</div><div class="ov-change">加载中...</div></div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">近 30 天收入趋势</div><div style="height:220px"><canvas id="revenueChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">实例类型分布</div><div style="height:220px"><canvas id="vmTypeChart"></canvas></div></div>
      </div>

      <!-- Recent Orders + Tickets -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="table-wrapper">
          <div class="table-header"><h3>最新订单</h3><a href="orders.html" class="btn-sm default">查看全部</a></div>
          <table class="data-table"><thead><tr><th>订单号</th><th>用户</th><th>产品</th><th>金额</th><th>状态</th></tr></thead><tbody id="recentOrders"></tbody></table>
        </div>
        <div class="table-wrapper">
          <div class="table-header"><h3>待处理工单</h3><a href="tickets-admin.html" class="btn-sm default">查看全部</a></div>
          <div id="pendingTickets"></div>
        </div>
      </div>

      <!-- Node Status -->
      <div class="table-wrapper" style="margin-top:20px">
        <div class="table-header"><h3>节点状态速览</h3><a href="nodes.html" class="btn-sm default">管理节点</a></div>
        <table class="data-table"><thead><tr><th>节点名称</th><th>类型</th><th>CPU</th><th>内存</th><th>存储</th><th>实例数</th><th>状态</th></tr></thead><tbody id="nodeStatuses"></tbody></table>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';

  // Auth guard
  if (!API.Auth.guard()) return;

  // Init user display
  const user = API.Auth.getUser();
  if (user) {
    document.getElementById('sidebarUserName').textContent = user.name || '管理员';
    document.getElementById('welcomeMsg').textContent = '欢迎回来，' + (user.name || '管理员');
    if (user.email) document.getElementById('sidebarUser').querySelector('.user-balance').textContent = user.email;
  }

  // Header time
  function updateTime() {
    document.getElementById('headerTime').textContent = new Date().toLocaleString('zh-CN');
  }
  updateTime();
  setInterval(updateTime, 30000);

  // Theme
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });

  // ===== Load Dashboard Data =====
  async function loadDashboard() {
    const res = await API.dashboard();
    if (!res.success) {
      console.error('Dashboard load failed:', res.message);
      return;
    }
    const d = res.data;

    // Stats
    document.getElementById('statUsers').textContent = (d.total_users || 0).toLocaleString();
    document.getElementById('statVms').textContent = (d.total_vms || 0).toLocaleString();
    document.getElementById('statRevenue').textContent = '¥' + parseFloat(d.total_revenue || 0).toLocaleString();
    document.getElementById('statTickets').textContent = d.pending_tickets || 0;

    // Update ticket sidebar badge
    const badge = document.getElementById('ticketCount');
    badge.textContent = d.pending_tickets || 0;
    badge.style.display = d.pending_tickets > 0 ? '' : 'none';

    // Revenue trend chart
    const revenueData = d.revenue_trend || {};
    const dates = Object.keys(revenueData).sort();
    const values = dates.map(k => parseFloat(revenueData[k]) || 0);
    const labels = dates.map(d => {
      const parts = d.split('-');
      return parts[1] + '/' + parts[2];
    });

    if (document.getElementById('revenueChart')) {
      new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
          labels: labels.length ? labels : ['暂无数据'],
          datasets: [{
            label: '收入(¥)', data: values.length ? values : [0],
            backgroundColor: 'rgba(234,88,12,0.08)',
            borderColor: 'rgba(234,88,12,0.8)', borderWidth: 2,
            tension: 0.3, fill: true,
            pointRadius: 2, pointHoverRadius: 5,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 10 } },
            y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 10 }, callback: v => '¥' + v } }
          }
        }
      });
    }

    // VM type distribution chart
    const vmTypes = d.vm_type_distribution || {};
    const typeLabels = Object.keys(vmTypes);
    const typeValues = Object.values(vmTypes);
    if (document.getElementById('vmTypeChart')) {
      new Chart(document.getElementById('vmTypeChart'), {
        type: 'doughnut',
        data: {
          labels: typeLabels.length ? typeLabels.map(t => t === 'kvm' ? 'KVM 虚拟机' : t === 'lxc' ? 'LXC 容器' : t) : ['暂无数据'],
          datasets: [{
            data: typeValues.length ? typeValues : [1],
            backgroundColor: ['rgba(37,99,235,0.8)', 'rgba(22,163,74,0.8)', 'rgba(234,88,12,0.8)'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 11 } } } }
        }
      });
    }

    // Recent orders
    const orderTbody = document.getElementById('recentOrders');
    const orders = d.recent_orders || [];
    if (orders.length === 0) {
      orderTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-3);padding:32px">暂无订单数据</td></tr>';
    } else {
      orderTbody.innerHTML = orders.map(o => 
        '<tr><td style="font-family:var(--mono)">' + (o.order_no || '#' + o.id) + '</td>' +
        '<td>' + (o.user ? o.user.name : '-') + '</td>' +
        '<td>' + (o.product ? o.product.name : '-') + '</td>' +
        '<td>' + UI.formatMoney(o.amount) + '</td>' +
        '<td>' + UI.statusBadge(o.payment_status || o.status) + '</td></tr>'
      ).join('');
    }

    // Pending tickets
    const ticketsDiv = document.getElementById('pendingTickets');
    const tickets = d.pending_tickets_list || [];
    if (tickets.length === 0) {
      ticketsDiv.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:32px">暂无待处理工单 🎉</div>';
    } else {
      const priorityMap = { high: 'priority-high', medium: 'priority-medium', low: 'priority-low' };
      ticketsDiv.innerHTML = tickets.map(t =>
        '<div class="ticket-item" style="cursor:pointer" onclick="window.location.href=\'tickets-admin.html\'">' +
        '<div class="ticket-priority ' + (priorityMap[t.priority] || 'priority-medium') + '"></div>' +
        '<div class="ticket-info"><div class="ticket-title">' + (t.title || t.subject || '无标题') + '</div>' +
        '<div class="ticket-meta"><span>' + (t.user ? t.user.name : '-') + '</span><span>' + UI.formatDate(t.created_at) + '</span></div></div>' +
        '<span class="badge badge-' + (t.priority === 'high' ? 'danger' : t.priority === 'medium' ? 'warning' : 'info') + '">' +
        (t.priority === 'high' ? '紧急' : t.priority === 'medium' ? '中' : '低') + '</span></div>'
      ).join('');
    }

    // Node statuses
    const nodeTbody = document.getElementById('nodeStatuses');
    const nodes = d.node_statuses || [];
    if (nodes.length === 0) {
      nodeTbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-3);padding:32px">暂无节点数据</td></tr>';
    } else {
      nodeTbody.innerHTML = nodes.map(n => {
        const cpuPct = n.cpu_total > 0 ? Math.round(n.cpu_used / n.cpu_total * 100) : 0;
        const memPct = n.memory_total > 0 ? Math.round(n.memory_used / n.memory_total * 100) : 0;
        const diskPct = n.disk_total > 0 ? Math.round(n.disk_used / n.disk_total * 100) : 0;
        const cpuColor = cpuPct > 80 ? 'var(--orange)' : 'var(--accent)';
        const memColor = memPct > 80 ? 'var(--orange)' : 'var(--green)';
        const diskColor = diskPct > 80 ? 'var(--orange)' : '#8b5cf6';

        return '<tr><td style="font-weight:600">' + (n.name || '#' + n.id) + '</td>' +
          '<td>' + (n.virtualization || '-') + '</td>' +
          '<td>' + progressBar(cpuPct, cpuColor) + '</td>' +
          '<td>' + progressBar(memPct, memColor) + '</td>' +
          '<td>' + progressBar(diskPct, diskColor) + '</td>' +
          '<td style="font-family:var(--mono)">' + (n.virtual_machines_count || 0) + '</td>' +
          '<td>' + UI.statusBadge(n.status || 'offline') + '</td></tr>';
      }).join('');
    }
  }

  function progressBar(pct, color) {
    return '<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;max-width:80px;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden">' +
      '<div style="width:' + pct + '%;height:100%;background:' + color + ';border-radius:2px"></div></div>' +
      '<span style="font-size:11px;font-family:var(--mono);min-width:30px">' + pct + '%</span></div>';
  }

  // Load on init
  loadDashboard();
})();
</script>
</body>
</html>
