<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 — CloudVM Pro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <div class="nav-brand">
        <div class="brand-icon" style="background:var(--orange)"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
        <span class="brand-name">CloudVM<span class="brand-pro" style="color:var(--orange)">管理</span></span>
      </div>
      <span class="admin-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section"><a class="sidebar-item" href="index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">业务管理</div>
        <a class="sidebar-item active" href="users.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a>
        <a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a>
        <a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a>
        <a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a>
        <a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div>
        <a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a>
        <a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div>
        <div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div>
        <a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">用户管理</span></div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="btn-sm primary" onclick="openAddModal()">+ 添加用户</button>
      </div>
    </div>

    <div class="admin-page">
      <div style="margin-bottom:24px">
        <h1 style="font-size:22px;margin-bottom:4px">用户管理</h1>
        <p style="font-size:14px;color:var(--text-3)">管理所有注册用户，支持搜索、筛选、编辑、启用/禁用</p>
      </div>

      <!-- Filters -->
      <div class="table-wrapper">
        <div class="table-header">
          <div style="display:flex;gap:12px;align-items:center">
            <input class="form-input" id="searchInput" placeholder="搜索用户名或邮箱..." style="width:260px" onkeyup="debounceSearch()">
            <select class="form-input" id="statusFilter" onchange="loadUsers(1)" style="width:140px">
              <option value="">全部状态</option><option value="active">正常</option><option value="disabled">已禁用</option>
            </select>
          </div>
          <span id="userCount" style="font-size:13px;color:var(--text-3)"></span>
        </div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>余额</th><th>VM数</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
          <tbody id="userTableBody"><tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-3)"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr></tbody>
        </table>
        <!-- Pagination -->
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:16px" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="userModal" style="display:none">
<div class="modal-content" style="max-width:500px">
  <div class="modal-header"><h2 id="userModalTitle">编辑用户</h2><button class="modal-close" onclick="closeModal('userModal')">&times;</button></div>
  <div class="modal-body">
    <input type="hidden" id="editUserId">
    <div class="form-group"><label>用户名</label><input class="form-input" id="editUserName"></div>
    <div class="form-group"><label>邮箱</label><input class="form-input" id="editUserEmail"></div>
    <div class="form-group"><label>角色</label><select class="form-input" id="editUserRole"><option value="user">普通用户</option><option value="admin">管理员</option></select></div>
    <div class="form-group"><label>余额</label><input class="form-input" id="editUserBalance" type="number" step="0.01"></div>
    <div class="form-group"><label>新密码 (留空不修改)</label><input class="form-input" id="editUserPassword" type="password" placeholder="留空则不修改密码"></div>
  </div>
  <div class="modal-footer">
    <span id="userModalMsg" style="color:var(--red);font-size:13px;margin-right:auto"></span>
    <button class="btn default" onclick="closeModal('userModal')">取消</button>
    <button class="btn primary" id="userSaveBtn" onclick="saveUser()">保存</button>
  </div>
</div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  let currentPage = 1, searchTimer = null;

  window.debounceSearch = function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadUsers(1), 300);
  };

  window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

  async function loadUsers(page) {
    currentPage = page || currentPage;
    const params = {
      page: currentPage,
      search: document.getElementById('searchInput').value.trim(),
      status: document.getElementById('statusFilter').value,
    };

    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';

    const res = await API.getUsers(params);
    if (!res.success) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--red)">加载失败: ' + (res.message||'') + '</td></tr>';
      return;
    }

    const users = res.data || [];
    const meta = res.meta || {};
    document.getElementById('userCount').textContent = '共 ' + (meta.total||0) + ' 条';

    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-3)">暂无用户数据</td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = users.map(u =>
      '<tr><td>' + u.id + '</td>' +
      '<td style="font-weight:600">' + esc(u.name) + '</td>' +
      '<td>' + esc(u.email) + '</td>' +
      '<td>' + (u.role === 'admin' ? '<span style="color:var(--orange);font-weight:600">管理员</span>' : '用户') + '</td>' +
      '<td style="font-family:var(--mono)">' + UI.formatMoney(u.balance) + '</td>' +
      '<td>' + (u.vms_count || u.virtual_machines_count || 0) + '</td>' +
      '<td>' + UI.statusBadge(u.status) + '</td>' +
      '<td style="font-size:12px">' + UI.formatDate(u.created_at) + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      '<button class="btn-sm default" onclick="editUser(' + u.id + ')" style="font-size:11px">编辑</button>' +
      (u.status === 'active'
        ? '<button class="btn-sm danger" onclick="toggleStatus(' + u.id + ',\'disable\')" style="font-size:11px">禁用</button>'
        : '<button class="btn-sm default" onclick="toggleStatus(' + u.id + ',\'enable\')" style="font-size:11px">启用</button>') +
      '<button class="btn-sm danger" onclick="deleteUser(' + u.id + ')" style="font-size:11px">删除</button>' +
      '</div></td></tr>'
    ).join('');

    // Pagination
    const pagDiv = document.getElementById('pagination');
    if (meta.last_page <= 1) { pagDiv.innerHTML = ''; return; }
    let html = '<button class="btn-sm default" onclick="loadUsers(' + (currentPage-1) + ')" ' + (currentPage<=1?'disabled':'') + '>上一页</button>';
    html += '<span style="font-size:13px;color:var(--text-2)">第 ' + currentPage + ' / ' + meta.last_page + ' 页</span>';
    html += '<button class="btn-sm default" onclick="loadUsers(' + (currentPage+1) + ')" ' + (currentPage>=meta.last_page?'disabled':'') + '>下一页</button>';
    pagDiv.innerHTML = html;
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  // Edit User
  window.editUser = async function(id) {
    const res = await API.getUser(id);
    if (!res.success) { UI.notify(res.message,'error'); return; }
    const u = res.data.user;
    document.getElementById('editUserId').value = u.id;
    document.getElementById('editUserName').value = u.name || '';
    document.getElementById('editUserEmail').value = u.email || '';
    document.getElementById('editUserRole').value = u.role || 'user';
    document.getElementById('editUserBalance').value = u.balance || 0;
    document.getElementById('editUserPassword').value = '';
    document.getElementById('userModalTitle').textContent = '编辑用户';
    document.getElementById('userModalMsg').textContent = '';
    document.getElementById('userModal').style.display = 'flex';
  };

  window.openAddModal = function() {
    document.getElementById('editUserId').value = '';
    document.getElementById('editUserName').value = '';
    document.getElementById('editUserEmail').value = '';
    document.getElementById('editUserRole').value = 'user';
    document.getElementById('editUserBalance').value = '0';
    document.getElementById('editUserPassword').value = '';
    document.getElementById('userModalTitle').textContent = '添加用户';
    document.getElementById('userModalMsg').textContent = '';
    document.getElementById('userModal').style.display = 'flex';
  };

  window.saveUser = async function() {
    const id = document.getElementById('editUserId').value;
    const data = {
      name: document.getElementById('editUserName').value.trim(),
      email: document.getElementById('editUserEmail').value.trim(),
      role: document.getElementById('editUserRole').value,
      balance: parseFloat(document.getElementById('editUserBalance').value) || 0,
    };
    const pwd = document.getElementById('editUserPassword').value;
    if (pwd) data.password = pwd;

    if (!data.name || !data.email) {
      document.getElementById('userModalMsg').textContent = '请填写用户名和邮箱';
      return;
    }

    document.getElementById('userSaveBtn').disabled = true;
    let res;
    if (id) {
      res = await API.updateUser(id, data);
    } else {
      // For new users, use register API
      data.password = data.password || '12345678';
      res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json',
          'Authorization': 'Bearer ' + API.Auth.getToken() },
        body: JSON.stringify(data)
      }).then(r => r.json());
    }
    document.getElementById('userSaveBtn').disabled = false;

    if (res.success) {
      UI.notify(id ? '用户已更新' : '用户添加成功', 'success');
      document.getElementById('userModal').style.display = 'none';
      loadUsers(currentPage);
    } else {
      document.getElementById('userModalMsg').textContent = res.message || '保存失败';
    }
  };

  window.toggleStatus = async function(id, action) {
    const res = action === 'disable' ? await API.disableUser(id) : await API.enableUser(id);
    if (res.success) {
      UI.notify(action === 'disable' ? '用户已禁用' : '用户已启用', 'success');
      loadUsers(currentPage);
    } else {
      UI.notify(res.message || '操作失败', 'error');
    }
  };

  window.deleteUser = async function(id) {
    if (!confirm('确定要删除此用户吗？该操作将同时删除用户的所有 VM、订单和工单，不可恢复！')) return;
    const res = await API.deleteUser(id);
    if (res.success) {
      UI.notify('用户已删除', 'success');
      loadUsers(currentPage);
    } else {
      UI.notify(res.message || '删除失败', 'error');
    }
  };

  // Init
  loadUsers(1);
})();
</script>
</body>
</html>
