<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虚拟机管理 — CloudVM Pro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
<link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <div class="nav-brand">
        <div class="brand-icon" style="background:var(--orange)"><svg width="18" height="18" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/><rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/><rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/></svg></div>
        <span class="brand-name">CloudVM<span class="brand-pro" style="color:var(--orange)">管理</span></span>
      </div>
      <span class="admin-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section"><a class="sidebar-item" href="index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">业务管理</div>
        <a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a>
        <a class="sidebar-item active" href="vms.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a>
        <a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a>
        <a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a>
        <a class="sidebar-item" href="tickets-admin.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a>
      </div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div>
        <a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a>
        <a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div>
        <div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div>
        <a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">虚拟机管理</span></div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="btn-sm danger" id="batchBtn" onclick="batchAction()" style="display:none">批量操作</button>
      </div>
    </div>

    <div class="admin-page">
      <div style="margin-bottom:24px">
        <h1 style="font-size:22px;margin-bottom:4px">虚拟机管理</h1>
        <p style="font-size:14px;color:var(--text-3)">管理所有虚拟机实例，支持开关机、重启、暂停、批量操作</p>
      </div>

      <div class="table-wrapper">
        <div class="table-header">
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <input class="form-input" id="vmSearch" placeholder="搜索 VM 名称/ID/IP..." style="width:220px" onkeyup="debounceSearch()">
            <select class="form-input" id="vmStatus" onchange="loadVms(1)" style="width:130px">
              <option value="">全部状态</option><option value="running">运行中</option><option value="stopped">已关机</option><option value="suspended">已暂停</option><option value="creating">创建中</option><option value="error">异常</option>
            </select>
            <select class="form-input" id="vmType" onchange="loadVms(1)" style="width:100px">
              <option value="">全部类型</option><option value="kvm">KVM</option><option value="lxc">LXC</option>
            </select>
          </div>
          <span id="vmCount" style="font-size:13px;color:var(--text-3)"></span>
        </div>
        <table class="data-table">
          <thead><tr>
            <th style="width:36px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
            <th>ID</th><th>VM名称</th><th>所属用户</th><th>节点</th><th>类型</th>
            <th>配置</th><th>IP</th><th>状态</th><th>到期时间</th><th>操作</th>
          </tr></thead>
          <tbody id="vmTableBody"><tr><td colspan="11" style="text-align:center;padding:32px;color:var(--text-3)"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr></tbody>
        </table>
        <div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:16px" id="vmPagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- VM Detail Modal -->
<div class="modal-overlay" id="vmDetailModal" style="display:none" onclick="if(event.target===this)closeVmDetail()">
  <div class="modal-content" style="max-width:780px;max-height:85vh;overflow-y:auto">
    <div class="modal-header">
      <h3 style="margin:0"><span id="detailVmName"></span></h3>
      <button class="topbar-btn" onclick="closeVmDetail()" style="border:none;background:none;cursor:pointer;padding:4px">&times;</button>
    </div>
    <div class="modal-body">
      <div id="detailLoading" style="text-align:center;padding:24px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载详细...</div>
      <div id="detailContent" style="display:none">
        <!-- Overview -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px">
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">VM ID</label><div style="font-family:var(--mono);font-size:14px" id="dvVmId"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">类型</label><div style="font-size:14px" id="dvType"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">状态</label><div id="dvStatus"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">节点</label><div style="font-size:14px" id="dvNode"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">所属用户</label><div style="font-size:14px" id="dvUser"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">产品</label><div style="font-size:14px" id="dvProduct"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">IP 地址</label><div style="font-family:var(--mono);font-size:12px" id="dvIp"></div></div>
          <div class="stat-card"><label style="font-size:11px;color:var(--text-3)">到期时间</label><div style="font-size:13px" id="dvExpires"></div></div>
        </div>
        <!-- Config -->
        <h4 style="margin:0 0 12px">配置管理</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">CPU (核)</label>
            <input class="form-input" id="editCpu" type="number" min="1" max="128" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">内存 (MB)</label>
            <input class="form-input" id="editMemory" type="number" min="128" max="1048576" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">磁盘 (GB)</label>
            <input class="form-input" id="editDisk" type="number" min="1" max="1048576" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">带宽 (Mbps)</label>
            <input class="form-input" id="editBandwidth" type="number" min="1" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">流量上限 (GB)</label>
            <input class="form-input" id="editTrafficLimit" type="number" min="0" style="width:100%">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-3);display:block;margin-bottom:4px">操作系统模板</label>
            <input class="form-input" id="editOsTemplate" type="text" style="width:100%">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <button class="btn-sm primary" onclick="saveVmConfig()">保存配置</button>
          <button class="btn-sm default" onclick="resetConfigForm()">重置</button>
        </div>
        <!-- Transfer Ownership -->
        <h4 style="margin:16px 0 12px">转移归属</h4>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
          <input class="form-input" id="transferUserId" type="number" placeholder="目标用户 ID" style="width:160px">
          <button class="btn-sm warning" onclick="transferVm()">转移</button>
          <span style="font-size:12px;color:var(--text-3)" id="transferResult"></span>
        </div>
        <!-- Notes -->
        <h4 style="margin:16px 0 12px">备注</h4>
        <textarea class="form-input" id="editNotes" style="width:100%;min-height:60px;resize:vertical"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-sm primary" onclick="saveNotes()">保存备注</button>
        </div>
        <!-- NAT Rules -->
        <h4 style="margin:16px 0 12px">NAT 端口转发规则</h4>
        <div id="natRulesList"><p style="color:var(--text-3);font-size:13px">加载中...</p></div>
      </div>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  let currentPage = 1, selectedIds = new Set(), searchTimer = null;

  window.debounceSearch = function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => loadVms(1), 300);
  };

  async function loadVms(page) {
    currentPage = page || currentPage;
    selectedIds.clear();
    document.getElementById('selectAll').checked = false;
    updateBatchBtn();

    const params = {
      page: currentPage,
      search: document.getElementById('vmSearch').value.trim(),
      status: document.getElementById('vmStatus').value,
      type: document.getElementById('vmType').value,
    };

    const tbody = document.getElementById('vmTableBody');
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';

    const res = await API.getVms(params);
    if (!res.success) {
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:32px;color:var(--red)">加载失败: ' + (res.message||'') + '</td></tr>';
      return;
    }

    const vms = res.data || [];
    const meta = res.meta || {};
    document.getElementById('vmCount').textContent = '共 ' + (meta.total||0) + ' 台';

    if (vms.length === 0) {
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:32px;color:var(--text-3)">暂无虚拟机数据</td></tr>';
      document.getElementById('vmPagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = vms.map(vm => {
      const specStr = vm.cpu + '核 / ' + formatMem(vm.memory) + ' / ' + vm.disk + 'G';
      const actions = [];
      if (vm.status === 'running') {
        actions.push('<button class="btn-sm default" onclick="vmAction('+vm.id+',\'stop\')" style="font-size:11px">关机</button>');
        actions.push('<button class="btn-sm default" onclick="vmAction('+vm.id+',\'restart\')" style="font-size:11px">重启</button>');
        actions.push('<button class="btn-sm warning" onclick="vmAction('+vm.id+',\'suspend\')" style="font-size:11px">暂停</button>');
      } else if (vm.status === 'stopped') {
        actions.push('<button class="btn-sm primary" onclick="vmAction('+vm.id+',\'start\')" style="font-size:11px">开机</button>');
      } else if (vm.status === 'suspended') {
        actions.push('<button class="btn-sm primary" onclick="vmAction('+vm.id+',\'unsuspend\')" style="font-size:11px">恢复</button>');
      }
      if (vm.status !== 'creating' && vm.status !== 'deleting') {
        actions.push('<button class="btn-sm danger" onclick="deleteVm('+vm.id+')" style="font-size:11px">删除</button>');
      }

      return '<tr><td><input type="checkbox" class="vm-checkbox" value="'+vm.id+'" onchange="toggleSelect('+vm.id+')"></td>' +
        '<td style="font-family:var(--mono)">' + (vm.vm_id || vm.id) + '</td>' +
        '<td style="font-weight:600">' + esc(vm.name) + '</td>' +
        '<td>' + (vm.user ? esc(vm.user.name) : '-') + '</td>' +
        '<td>' + (vm.node ? esc(vm.node.name) : '-') + '</td>' +
        '<td><span style="font-size:11px;color:' + (vm.type==='kvm'?'#2563eb':'#16a34a') + '">' + (vm.type||'-').toUpperCase() + '</span></td>' +
        '<td style="font-size:12px">' + specStr + '</td>' +
        '<td style="font-family:var(--mono);font-size:12px">' + (vm.ip || '-') + '</td>' +
        '<td>' + UI.statusBadge(vm.status) + '</td>' +
        '<td style="font-size:12px">' + (vm.expires_at ? UI.formatDate(vm.expires_at) : '-') + '</td>' +
        '<td><div style="display:flex;gap:4px;flex-wrap:wrap">' + actions.join('') + '</div></td></tr>';
    }).join('');

    // Pagination
    const pagDiv = document.getElementById('vmPagination');
    if (meta.last_page <= 1) { pagDiv.innerHTML = ''; return; }
    pagDiv.innerHTML = '<button class="btn-sm default" onclick="loadVms('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>上一页</button>' +
      '<span style="font-size:13px;color:var(--text-2)">第 '+currentPage+' / '+meta.last_page+' 页</span>' +
      '<button class="btn-sm default" onclick="loadVms('+(currentPage+1)+')" '+(currentPage>=meta.last_page?'disabled':'')+'>下一页</button>';
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
  function formatMem(m) { return m >= 1024 ? (m/1024).toFixed(1)+'G' : m+'M'; }

  window.toggleSelect = function(id) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    updateBatchBtn();
  };

  window.toggleSelectAll = function() {
    const checked = document.getElementById('selectAll').checked;
    document.querySelectorAll('.vm-checkbox').forEach(cb => {
      cb.checked = checked;
      const id = parseInt(cb.value);
      if (checked) selectedIds.add(id); else selectedIds.delete(id);
    });
    updateBatchBtn();
  };

  function updateBatchBtn() {
    const btn = document.getElementById('batchBtn');
    btn.style.display = selectedIds.size > 0 ? '' : 'none';
    btn.textContent = '批量操作 (' + selectedIds.size + ')';
  }

  window.vmAction = async function(id, action) {
    const actionMap = {
      start: API.startVm, stop: API.stopVm, restart: API.restartVm,
      suspend: API.suspendVm, unsuspend: API.unsuspendVm
    };
    const labelMap = { start:'开机', stop:'关机', restart:'重启', suspend:'暂停', unsuspend:'恢复' };

    if (action === 'stop' && !confirm('确定要关机吗？')) return;
    if (action === 'delete' && !confirm('确定要删除此 VM 吗？')) return;

    const res = await actionMap[action](id);
    if (res.success) {
      UI.notify(labelMap[action] + '成功', 'success');
      setTimeout(() => loadVms(currentPage), 1000);
    } else {
      UI.notify(res.message || '操作失败', 'error');
    }
  };

  window.deleteVm = async function(id) {
    if (!confirm('确定要强制删除此虚拟机吗？此操作不可恢复！')) return;
    const res = await API.deleteVm(id);
    if (res.success) { UI.notify('VM 已删除', 'success'); loadVms(currentPage); }
    else { UI.notify(res.message || '删除失败', 'error'); }
  };

  window.batchAction = async function() {
    if (selectedIds.size === 0) return;
    const action = prompt('请输入批量操作: start / stop / restart / delete');
    if (!action || !['start','stop','restart','delete'].includes(action)) return;
    if (action === 'delete' && !confirm('确定要批量删除 ' + selectedIds.size + ' 台 VM？')) return;

    const res = await API.batchVm(action, Array.from(selectedIds));
    if (res.success) {
      UI.notify('批量操作完成', 'success');
      setTimeout(() => loadVms(currentPage), 1500);
    } else {
      UI.notify(res.message || '批量操作失败', 'error');
    }
  };

  loadVms(1);
    // ──────────────────────────────────────────────
    // VM Detail Modal
    // ──────────────────────────────────────────────
    let currentDetailVmId = null;

    window.openVmDetail = async function(vmId) {
      currentDetailVmId = vmId;
      const modal = document.getElementById('vmDetailModal');
      const loading = document.getElementById('detailLoading');
      const content = document.getElementById('detailContent');
      modal.style.display = 'flex';
      loading.style.display = 'block';
      content.style.display = 'none';

      const res = await API.getVmDetail(vmId);
      loading.style.display = 'none';

      if (!res.success) {
        content.innerHTML = '<p style="color:var(--red)">加载失败: ' + (res.message||'') + '</p>';
        content.style.display = 'block';
        return;
      }

      const vm = res.data.vm || res.data;
      content.style.display = 'block';

      document.getElementById('detailVmName').textContent = vm.name || 'VM #' + vm.id;
      document.getElementById('dvVmId').textContent = vm.vm_id || vm.id;
      document.getElementById('dvType').textContent = (vm.type||'kvm').toUpperCase();
      document.getElementById('dvStatus').innerHTML = UI.statusBadge(vm.status);
      document.getElementById('dvNode').textContent = vm.node ? vm.node.name : '-';
      document.getElementById('dvUser').textContent = vm.user ? (vm.user.name + ' (' + vm.user.email + ')') : '-';
      document.getElementById('dvProduct').textContent = vm.product ? vm.product.name : '-';
      document.getElementById('dvIp').textContent = vm.ip || vm.nat_ipv4 || vm.ipv6_address || '-';
      document.getElementById('dvExpires').textContent = vm.expires_at ? UI.formatDate(vm.expires_at) : '-';

      // Fill config form
      document.getElementById('editCpu').value = vm.cpu || 1;
      document.getElementById('editMemory').value = vm.memory || 512;
      document.getElementById('editDisk').value = vm.disk || 10;
      document.getElementById('editBandwidth').value = vm.bandwidth || 100;
      document.getElementById('editTrafficLimit').value = vm.traffic_limit || 0;
      document.getElementById('editOsTemplate').value = vm.os_template || '';
      document.getElementById('editNotes').value = vm.notes || '';

      // Load NAT rules
      loadNatRules(vm);
    };

    async function loadNatRules(vm) {
      const container = document.getElementById('natRulesList');
      if (vm.natRules && vm.natRules.length > 0) {
        container.innerHTML = '<table class="data-table"><thead><tr><th>本地IP</th><th>本地端口</th><th>公网端口</th><th>协议</th><th>状态</th></tr></thead><tbody>' +
          vm.natRules.map(r => '<tr><td style="font-family:var(--mono)">' + esc(r.local_ip) + '</td><td>' + r.local_port + '</td><td>' + r.public_port + '</td><td>' + (r.protocol||'tcp').toUpperCase() + '</td><td>' + UI.statusBadge(r.status) + '</td></tr>').join('') +
          '</tbody></table>';
      } else {
        container.innerHTML = '<p style="color:var(--text-3);font-size:13px">暂无 NAT 规则</p>';
      }
    }

    window.closeVmDetail = function() {
      document.getElementById('vmDetailModal').style.display = 'none';
      currentDetailVmId = null;
    };

    window.saveVmConfig = async function() {
      if (!currentDetailVmId) return;
      const data = {
        cpu: parseInt(document.getElementById('editCpu').value) || 1,
        memory: parseInt(document.getElementById('editMemory').value) || 512,
        disk: parseInt(document.getElementById('editDisk').value) || 10,
        bandwidth: parseInt(document.getElementById('editBandwidth').value) || 100,
        traffic_limit: parseInt(document.getElementById('editTrafficLimit').value) || 0,
        os_template: document.getElementById('editOsTemplate').value || null,
      };
      const res = await API.updateVm(currentDetailVmId, data);
      if (res.success) {
        UI.notify('VM 配置已更新', 'success');
        loadVms(currentPage);
      } else {
        UI.notify(res.message || '更新失败', 'error');
      }
    };

    window.resetConfigForm = function() {
      openVmDetail(currentDetailVmId);
    };

    window.saveNotes = async function() {
      if (!currentDetailVmId) return;
      const res = await API.updateVm(currentDetailVmId, { notes: document.getElementById('editNotes').value });
      if (res.success) UI.notify('备注已保存', 'success');
      else UI.notify(res.message || '保存失败', 'error');
    };

    window.transferVm = async function() {
      if (!currentDetailVmId) return;
      const targetUserId = document.getElementById('transferUserId').value.trim();
      if (!targetUserId) { UI.notify('请输入目标用户 ID', 'error'); return; }
      if (!confirm('确定将虚拟机转移给用户 ID ' + targetUserId + ' 吗？')) return;

      const res = await API.transferVm(currentDetailVmId, parseInt(targetUserId));
      const resultEl = document.getElementById('transferResult');
      if (res.success) {
        resultEl.style.color = 'var(--green)';
        resultEl.textContent = '✓ 已转移至 ' + (res.data.vm?.user?.name || '用户 ' + targetUserId);
        loadVms(currentPage);
      } else {
        resultEl.style.color = 'var(--red)';
        resultEl.textContent = '✗ ' + (res.message || '转移失败');
      }
    };

    // Make rows clickable for detail
    document.addEventListener('click', function(e) {
      const row = e.target.closest('tr');
      if (row && row.closest('#vmTableBody')) {
        const checkbox = row.querySelector('.vm-checkbox');
        if (checkbox && !e.target.closest('button') && !e.target.closest('input')) {
          openVmDetail(parseInt(checkbox.value));
        }
      }
    });

    // Add detail button to action column
    const origRender = loadVms;
    loadVms = function(page) {
      currentPage = page || currentPage;
      // ... original logic is above, we just add the page load call
    };
})();
</script>
</body>
</html>
