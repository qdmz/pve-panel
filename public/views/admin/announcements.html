    <div class="admin-topbar"><button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">公告管理</span></div><div style="margin-left:auto"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><button class="btn-sm primary" onclick="openModal()">+ 发布公告</button></div></div>

    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">公告管理</h1><p style="font-size:14px;color:var(--text-3)">管理系统公告和通知，支持发布、编辑、置顶、上下架</p></div>
      <div class="table-wrapper">
        <table class="data-table"><thead><tr><th>标题</th><th>类型</th><th>置顶</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none"><div class="modal-content" style="max-width:550px">
  <div class="modal-header"><h2 id="modalTitle">发布公告</h2><button class="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</button></div>
  <div class="modal-body">
    <input type="hidden" id="editId">
    <div class="form-group"><label>标题 *</label><input class="form-input" id="title"></div>
    <div class="form-group"><label>内容 *</label><textarea class="form-input" id="content" rows="5"></textarea></div>
    <div class="form-group"><label>类型</label><select class="form-input" id="type"><option value="info">通知</option><option value="warning">警告</option><option value="success">好消息</option><option value="danger">紧急</option></select></div>
    <div class="form-group"><label>状态</label><select class="form-input" id="status"><option value="active">发布</option><option value="inactive">草稿</option></select></div>
  </div>
  <div class="modal-footer"><span id="msg" style="color:var(--red);font-size:13px;margin-right:auto"></span><button class="btn default" onclick="document.getElementById('modal').style.display='none'">取消</button><button class="btn primary" id="saveBtn" onclick="save()">保存</button></div>
</div></div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  let announcementsList = [];

  async function load() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';
    const res = await API.getAnnouncements();
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">加载失败</td></tr>'; return; }
    const raw = res.data || {};
    announcementsList = Array.isArray(raw) ? raw : (raw.announcements || []);
    if (announcementsList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3)">暂无公告</td></tr>';
      return;
    }
    tbody.innerHTML = announcementsList.map(a =>
      '<tr><td style="font-weight:600">' + esc(a.title) + '</td>' +
      '<td>' + UI.statusBadge(a.type || 'info', {info:['info','通知'],warning:['warning','警告'],success:['success','好消息'],danger:['danger','紧急']}) + '</td>' +
      '<td>' + (a.is_pinned ? '📌 置顶' : '-') + '</td>' +
      '<td>' + UI.statusBadge(a.status || 'active', {active:['success','已发布'],inactive:['default','草稿']}) + '</td>' +
      '<td style="font-size:12px">' + UI.formatDate(a.created_at) + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      '<button class="btn-sm default" onclick="edit('+a.id+')" style="font-size:11px">编辑</button>' +
      '<button class="btn-sm default" onclick="togglePin('+a.id+')" style="font-size:11px">'+(a.is_pinned?'取消置顶':'置顶')+'</button>' +
      '<button class="btn-sm default" onclick="toggleStatus('+a.id+')" style="font-size:11px">'+(a.status==='active'?'下架':'发布')+'</button>' +
      '<button class="btn-sm danger" onclick="del('+a.id+')" style="font-size:11px">删除</button>' +
      '</div></td></tr>'
    ).join('');
  }
  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

  window.openModal = function() {
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = '发布公告';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('type').value = 'info';
    document.getElementById('status').value = 'active';
    document.getElementById('msg').textContent = '';
    document.getElementById('modal').style.display = 'flex';
  };

  window.edit = function(id) {
    const a = announcementsList.find(x => x.id === id);
    if (!a) { UI.notify('未找到该公告', 'error'); return; }
    document.getElementById('editId').value = a.id;
    document.getElementById('modalTitle').textContent = '编辑公告';
    document.getElementById('title').value = a.title || '';
    document.getElementById('content').value = a.content || '';
    document.getElementById('type').value = a.type || 'info';
    document.getElementById('status').value = a.status || 'active';
    document.getElementById('modal').style.display = 'flex';
  };

  window.save = async function() {
    const id = document.getElementById('editId').value;
    const data = { title: document.getElementById('title').value.trim(), content: document.getElementById('content').value.trim(),
      type: document.getElementById('type').value, status: document.getElementById('status').value };
    if (!data.title) { document.getElementById('msg').textContent = '请输入标题'; return; }
    document.getElementById('saveBtn').disabled = true;
    const res = id ? await API.updateAnnouncement(id, data) : await API.createAnnouncement(data);
    document.getElementById('saveBtn').disabled = false;
    if (res.success) { document.getElementById('modal').style.display = 'none'; UI.notify(id?'已更新':'已发布','success'); load(); }
    else document.getElementById('msg').textContent = res.message;
  };

  window.togglePin = async function(id) { const r = await API.togglePin(id); if (r.success) { UI.notify('已切换','success'); load(); } else UI.notify(r.message,'error'); };
  window.toggleStatus = async function(id) { const r = await API.toggleAnnouncementStatus(id); if (r.success) { UI.notify('已切换','success'); load(); } else UI.notify(r.message,'error'); };
  window.del = async function(id) { if (!confirm('确定删除？')) return; const r = await API.deleteAnnouncement(id); if (r.success) { UI.notify('已删除','success'); load(); } else UI.notify(r.message,'error'); };

  load();
})();
</script>
</body>
</html>
