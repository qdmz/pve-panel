<style>
.badge-type-notice { background:var(--accent-soft);color:var(--accent); }
.badge-type-maintenance { background:rgba(245,158,11,0.1);color:#d97706; }
.badge-type-update { background:var(--green-soft);color:var(--green); }
.badge-type-event { background:rgba(139,92,246,0.1);color:#8b5cf6; }
.badge-status-published { background:var(--green-soft);color:var(--green); }
.badge-status-draft { background:var(--bg-3);color:var(--text-3); }
.announcement-card {
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:14px; padding:20px 22px;
  transition:var(--transition); position:relative;
  display:flex; gap:16px; align-items:flex-start;
}
.announcement-card:hover { box-shadow:var(--shadow); }
.announcement-card.pinned { border-color:var(--orange); }
.ann-card-select { margin-top:4px; flex-shrink:0; accent-color:var(--accent); }
.ann-card-body { flex:1; min-width:0; }
.ann-card-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
.ann-card-title { font-size:16px;font-weight:700; }
.ann-card-meta { font-size:12px;color:var(--text-3);margin-top:6px;display:flex;gap:16px;align-items:center;flex-wrap:wrap; }
.ann-card-content { font-size:14px;color:var(--text-2);line-height:1.6;margin-top:10px; }
.ann-card-actions { display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap; }
.pin-badge { position:absolute;top:-1px;right:-1px;padding:4px 12px;background:var(--orange);color:#fff;font-size:11px;font-weight:700;border-radius:0 14px 0 12px; }
.preview-card { background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:680px;margin:0 auto; }
.preview-card .preview-type { font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;display:inline-block;padding:4px 12px;border-radius:6px; }
.preview-card .preview-title { font-size:22px;font-weight:800;margin-bottom:8px; }
.preview-card .preview-date { font-size:13px;color:var(--text-3);margin-bottom:20px; }
.preview-card .preview-content { font-size:15px;color:var(--text-2);line-height:1.7; }
.empty-state { text-align:center;padding:60px 20px; }
.empty-state-icon { font-size:48px;margin-bottom:16px;opacity:0.5; }
.empty-state h3 { font-size:18px;color:var(--text-2);margin-bottom:6px; }
.empty-state p { font-size:14px;color:var(--text-3);margin-bottom:20px; }
.bulk-actions-bar { display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--accent-soft);border-radius:10px;margin-bottom:16px;font-size:13px;font-weight:600; }
.bulk-actions-bar span { color:var(--accent); }
</style>
</head>

<!-- Create/Edit Announcement Modal -->
<div class="modal-overlay" id="announceModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 id="announceModalTitle">创建公告</h3>
      <button class="modal-close" onclick="closeAnnounceModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editAnnounceId">
      <div class="form-group"><label>公告标题 <span style="color:var(--red)">*</span></label>
        <input type="text" class="form-input" id="announceTitle" placeholder="请输入公告标题" style="width:100%">
      </div>
      <div class="form-row">
        <div class="form-group"><label>公告类型</label>
          <select class="form-input" id="announceType" style="width:100%;cursor:pointer">
            <option value="notice">通知</option>
            <option value="maintenance">维护公告</option>
            <option value="update">产品更新</option>
            <option value="event">活动</option>
          </select>
        </div>
        <div class="form-group"><label>发布状态</label>
          <select class="form-input" id="announceStatus" style="width:100%;cursor:pointer">
            <option value="published">发布</option>
            <option value="draft">草稿</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>公告内容 <span style="color:var(--red)">*</span></label>
        <textarea class="form-input" id="announceContent" rows="6" placeholder="请输入公告内容（支持换行）..." style="width:100%;resize:vertical;font-family:var(--font);line-height:1.6"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group"><label>目标用户</label>
          <select class="form-input" id="announceAudience" style="width:100%;cursor:pointer">
            <option value="all">所有用户</option>
            <option value="kvm">KVM 用户</option>
            <option value="lxc">LXC 用户</option>
          </select>
        </div>
        <div class="form-group">
          <label style="display:block;margin-bottom:6px">&nbsp;</label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding-top:8px">
            <input type="checkbox" id="announcePinned" style="accent-color:var(--orange);width:16px;height:16px">
            <span style="font-size:13px;font-weight:600">置顶公告</span>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm default" onclick="previewAnnounce()" style="margin-right:auto">预览</button>
      <button class="btn-sm default" onclick="closeAnnounceModal()">取消</button>
      <button class="btn-sm primary" onclick="saveAnnounce()">保存</button>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <h3>公告预览</h3>
      <button class="modal-close" onclick="ModalManager.close('previewModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="preview-card">
        <div class="preview-type" id="previewType">通知</div>
        <div class="preview-title" id="previewTitle"></div>
        <div class="preview-date" id="previewDate"></div>
        <div class="preview-content" id="previewContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3>删除公告</h3><button class="modal-close" onclick="ModalManager.close('deleteModal')">&times;</button></div>
    <div class="modal-body">
      <p style="color:var(--text-2);font-size:14px;line-height:1.6">确定要删除该公告吗？此操作无法撤销。</p>
    </div>
    <div class="modal-footer">
      <button class="btn-sm default" onclick="ModalManager.close('deleteModal')">取消</button>
      <button class="btn-sm danger" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<script>
var announcements = [
  { id:'A001', title:'[紧急] 广州CN1节点计划维护通知', type:'maintenance', status:'published', content:'亲爱的用户：\n\n我们计划于 2025年7月5日 02:00-04:00 对广州CN1节点进行系统维护升级。\n\n维护期间，该节点上的虚拟机可能出现短暂网络中断（预计不超过10分钟），但不会丢失数据。\n\n建议您提前做好相关业务切换准备。\n\n如有紧急需求，请联系技术支持团队。\n\n感谢您的理解与支持！', audience:'all', pinned:true, created:'2025-07-01', author:'超级管理员' },
  { id:'A002', title:'新功能上线：一键快照备份与恢复', type:'update', status:'published', content:'我们很高兴地宣布，CloudVM Pro 现已支持一键快照备份功能！\n\n核心特性：\n- 全量/增量快照，支持自定义保留策略\n- 一键恢复到任意时间点\n- 跨节点快照迁移\n- 快照占用空间可视化\n\n所有用户默认享有 3 个免费快照配额，专业版用户无限快照。\n\n立即登录控制台体验！', audience:'all', pinned:false, created:'2025-06-28', author:'超级管理员' },
  { id:'A003', title:'七月促销活动：年付享8折优惠', type:'event', status:'published', content:'盛夏特惠来临！\n\n活动时间：2025年7月1日 - 7月31日\n\n活动内容：\n- 所有 KVM/LXC 产品年付享 8 折优惠\n- 新用户首次年付额外赠送 1 个月\n- 推荐好友注册双方各得 50 元代金券\n\n活动期间新购或续费均可享受，机会难得！', audience:'all', pinned:true, created:'2025-06-30', author:'超级管理员' },
  { id:'A004', title:'关于LXC容器网络优化调整的通知', type:'notice', status:'published', content:'各位用户：\n\n为进一步提升LXC容器的网络性能，我们对网络栈进行了优化调整。\n\n主要变更：\n- 默认MTU从1500调整为1400，提升隧道效率\n- NAT转发延迟降低约30%\n- 新增IPv6自动配置支持（需手动开启）\n\n以上变更已自动生效，无需用户操作。如遇到兼容性问题，请提交工单联系我们。', audience:'lxc', pinned:false, created:'2025-06-25', author:'超级管理员' },
  { id:'A005', title:'KVM专业版新增Windows Server 2025镜像', type:'update', status:'draft', content:'KVM专业版用户现已可使用Windows Server 2025 Datacenter镜像创建虚拟机。\n\n支持版本：\n- Windows Server 2025 Datacenter (含桌面体验)\n- Windows Server 2025 Standard\n\n最低配置要求：2核CPU，4GB内存，40GB系统盘。\n\n（本文尚在起草中，发布前请确认镜像同步完成）', audience:'kvm', pinned:false, created:'2025-06-22', author:'超级管理员' },
  { id:'A006', title:'关于近期部分用户支付失败的说明', type:'notice', status:'published', content:'接到部分用户反馈支付宝支付偶发失败，经排查系支付宝侧证书到期导致。\n\n我们已于2025年6月20日完成证书更新，支付服务已恢复正常。\n\n受影响的用户，未成功的订单将自动取消，余额不受影响。\n\n给您带来不便敬请谅解，如有疑问请联系：billing@cloudvm.pro', audience:'all', pinned:false, created:'2025-06-20', author:'超级管理员' }
];

var deleteTargetId = null;

function getTypeBadge(t) {
  var map = {notice:'通知',maintenance:'维护公告',update:'产品更新',event:'活动'};
  return '<span class="badge badge-type-'+t+'">'+map[t]+'</span>';
}
function getStatusBadge(s) {
  return s==='published' ? '<span class="badge badge-status-published">已发布</span>' : '<span class="badge badge-status-draft">草稿</span>';
}

function renderList() {
  var container = document.getElementById('announcementList');
  var empty = document.getElementById('emptyState');
  if (announcements.length===0) {
    container.innerHTML='';
    empty.style.display='block';
    document.getElementById('bulkBar').style.display='none';
    return;
  }
  empty.style.display='none';
  var html = '';
  announcements.forEach(function(a){
    var pinnedTag = a.pinned ? '<div class="pin-badge">置顶</div>' : '';
    html += '<div class="announcement-card'+(a.pinned?' pinned':'')+'" id="card-'+a.id+'">';
    html += '<input type="checkbox" class="ann-card-select" data-id="'+a.id+'" onchange="updateBulkBar()">';
    html += pinnedTag;
    html += '<div class="ann-card-body">';
    html += '<div class="ann-card-header">';
    html += '<span class="ann-card-title">'+a.title+'</span>';
    html += getTypeBadge(a.type);
    html += getStatusBadge(a.status);
    html += '</div>';
    html += '<div class="ann-card-meta">';
    html += '<span>作者：'+a.author+'</span>';
    html += '<span>创建：'+a.created+'</span>';
    html += '<span>目标：'+(a.audience==='all'?'所有用户':a.audience==='kvm'?'KVM用户':'LXC用户')+'</span>';
    html += '</div>';
    html += '<div class="ann-card-content">'+a.content.split('\n').slice(0,2).join(' ')+'...</div>';
    html += '</div>';
    html += '<div class="ann-card-actions">';
    html += '<button class="btn-sm default" onclick="editAnnounce(\''+a.id+'\')">编辑</button>';
    html += '<button class="btn-sm default" onclick="previewById(\''+a.id+'\')">预览</button>';
    html += '<button class="btn-sm danger" onclick="deleteAnnounce(\''+a.id+'\')">删除</button>';
    if (a.status==='draft') {
      html += '<button class="btn-sm success" onclick="publishSingle(\''+a.id+'\')">发布</button>';
    }
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function openCreateModal() {
  document.getElementById('announceModalTitle').textContent = '创建公告';
  document.getElementById('editAnnounceId').value = '';
  document.getElementById('announceTitle').value = '';
  document.getElementById('announceType').value = 'notice';
  document.getElementById('announceStatus').value = 'published';
  document.getElementById('announceContent').value = '';
  document.getElementById('announceAudience').value = 'all';
  document.getElementById('announcePinned').checked = false;
  ModalManager.open('announceModal');
}

function editAnnounce(id) {
  var a = announcements.find(function(x){return x.id===id;});
  if (!a) return;
  document.getElementById('announceModalTitle').textContent = '编辑公告';
  document.getElementById('editAnnounceId').value = a.id;
  document.getElementById('announceTitle').value = a.title;
  document.getElementById('announceType').value = a.type;
  document.getElementById('announceStatus').value = a.status;
  document.getElementById('announceContent').value = a.content;
  document.getElementById('announceAudience').value = a.audience;
  document.getElementById('announcePinned').checked = a.pinned;
  ModalManager.open('announceModal');
}

function closeAnnounceModal() {
  ModalManager.close('announceModal');
}

function saveAnnounce() {
  var title = document.getElementById('announceTitle').value.trim();
  var content = document.getElementById('announceContent').value.trim();
  if (!title || !content) {
    showNotification('提示','请填写标题和内容','error');
    return;
  }
  var editId = document.getElementById('editAnnounceId').value;
  var data = {
    title: title,
    type: document.getElementById('announceType').value,
    status: document.getElementById('announceStatus').value,
    content: content,
    audience: document.getElementById('announceAudience').value,
    pinned: document.getElementById('announcePinned').checked
  };
  if (editId) {
    var a = announcements.find(function(x){return x.id===editId;});
    if (a) {
      a.title=data.title; a.type=data.type; a.status=data.status;
      a.content=data.content; a.audience=data.audience; a.pinned=data.pinned;
    }
    showNotification('已更新','公告 '+editId+' 已更新','success');
  } else {
    var newId = 'A'+String(announcements.length+1).padStart(3,'0');
    announcements.unshift({id:newId, title:data.title, type:data.type, status:data.status,
      content:data.content, audience:data.audience, pinned:data.pinned,
      created:new Date().toISOString().slice(0,10), author:'超级管理员'});
    showNotification('已创建','公告 '+newId+' 已保存','success');
  }
  ModalManager.close('announceModal');
  renderList();
}

function previewAnnounce() {
  var title = document.getElementById('announceTitle').value.trim();
  var content = document.getElementById('announceContent').value.trim();
  var type = document.getElementById('announceType').value;
  if (!title || !content) {
    showNotification('提示','请先填写标题和内容','error');
    return;
  }
  var typeMap = {notice:'通知',maintenance:'维护公告',update:'产品更新',event:'活动'};
  var typeClass = 'badge-type-'+type;
  document.getElementById('previewType').textContent = typeMap[type];
  document.getElementById('previewType').className = 'preview-type '+typeClass;
  document.getElementById('previewTitle').textContent = title;
  document.getElementById('previewDate').textContent = new Date().toISOString().slice(0,16).replace('T',' ');
  document.getElementById('previewContent').innerHTML = content.split('\n').map(function(l){return '<p style="margin-bottom:10px">'+(l||'&nbsp;')+'</p>';}).join('');
  ModalManager.open('previewModal');
}

function previewById(id) {
  var a = announcements.find(function(x){return x.id===id;});
  if (!a) return;
  var typeMap = {notice:'通知',maintenance:'维护公告',update:'产品更新',event:'活动'};
  document.getElementById('previewType').textContent = typeMap[a.type];
  document.getElementById('previewType').className = 'preview-type badge-type-'+a.type;
  document.getElementById('previewTitle').textContent = a.title;
  document.getElementById('previewDate').textContent = a.created;
  document.getElementById('previewContent').innerHTML = a.content.split('\n').map(function(l){return '<p style="margin-bottom:10px">'+(l||'&nbsp;')+'</p>';}).join('');
  ModalManager.open('previewModal');
}

function deleteAnnounce(id) {
  deleteTargetId = id;
  ModalManager.open('deleteModal');
}

function confirmDelete() {
  if (!deleteTargetId) return;
  announcements = announcements.filter(function(x){return x.id!==deleteTargetId;});
  deleteTargetId = null;
  ModalManager.close('deleteModal');
  showNotification('已删除','公告已删除','success');
  renderList();
}

function publishSingle(id) {
  var a = announcements.find(function(x){return x.id===id;});
  if (!a) return;
  a.status = 'published';
  showNotification('已发布','公告已发布，用户可见','success');
  renderList();
}

function updateBulkBar() {
  var checked = document.querySelectorAll('.ann-card-select:checked');
  var bar = document.getElementById('bulkBar');
  document.getElementById('bulkCount').textContent = checked.length;
  bar.style.display = checked.length>0 ? 'flex':'none';
}

function selectAll() {
  var allChecked = document.querySelectorAll('.ann-card-select:checked').length === document.querySelectorAll('.ann-card-select').length;
  document.querySelectorAll('.ann-card-select').forEach(function(cb){cb.checked = !allChecked;});
  updateBulkBar();
}

function bulkDelete() {
  var checked = document.querySelectorAll('.ann-card-select:checked');
  if (checked.length===0) return;
  var ids = Array.from(checked).map(function(cb){return cb.dataset.id;});
  announcements = announcements.filter(function(a){return ids.indexOf(a.id)===-1;});
  showNotification('已删除','已删除 '+ids.length+' 条公告','success');
  renderList();
}

function bulkPublish() {
  var checked = document.querySelectorAll('.ann-card-select:checked');
  if (checked.length===0) return;
  var ids = Array.from(checked).map(function(cb){return cb.dataset.id;});
  announcements.forEach(function(a){
    if (ids.indexOf(a.id)!==-1) a.status='published';
  });
  showNotification('已发布','已发布 '+ids.length+' 条公告','success');
  renderList();
}

document.addEventListener('DOMContentLoaded', function(){
  ThemeManager.init();
  renderList();
});
</script>
</body>
</html>
