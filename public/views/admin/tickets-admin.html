<style>
.priority-urgent { background: rgba(220,38,38,0.1); color: #dc2626; font-weight:700; }
.priority-high { background: rgba(249,115,22,0.1); color: #f97316; font-weight:700; }
.priority-medium { background: rgba(245,158,11,0.1); color: #d97706; font-weight:600; }
.priority-low { background: rgba(107,114,128,0.1); color: #6b7280; }
.status-open { background: var(--accent-soft); color: var(--accent); }
.status-progress { background: rgba(245,158,11,0.1); color: #d97706; }
.status-resolved { background: var(--green-soft); color: var(--green); }
.status-closed { background: var(--bg-3); color: var(--text-3); }
.filter-tab { padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg-3); color:var(--text-2); transition:var(--transition); }
.filter-tab:hover { background:var(--bg); color:var(--text); }
.filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.ticket-row { cursor:pointer; transition:background 0.15s; }
.ticket-row:hover { background:var(--bg-3); }
.ticket-row.expanded { background:var(--accent-soft); }
.ticket-expand { display:none; }
.ticket-expand.show { display:table-row; }
.ticket-expand td { padding:0; }
.ticket-detail-inline { padding:24px 28px; border-top:2px solid var(--accent); background:var(--bg); }
.ticket-thread { margin-bottom:20px; }
.ticket-thread-msg { display:flex; gap:12px; margin-bottom:14px; }
.ticket-thread-msg .thread-avatar { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0; }
.thread-admin { background:linear-gradient(135deg,var(--orange),#f59e0b); }
.thread-user { background:linear-gradient(135deg,var(--accent),#818cf8); }
.thread-body { flex:1; }
.thread-meta { font-size:12px; color:var(--text-3); margin-bottom:4px; display:flex; align-items:center; gap:8px; }
.thread-content { font-size:14px; color:var(--text); line-height:1.6; background:var(--bg-2); padding:12px 16px; border-radius:10px; border:1px solid var(--border); }
.ticket-inline-reply { display:flex; gap:10px; align-items:flex-start; }
.ticket-inline-reply textarea { flex:1; min-height:60px; padding:10px 14px; background:var(--bg-2); border:1px solid var(--border); border-radius:10px; font-size:14px; color:var(--text); font-family:var(--font); resize:vertical; outline:none; transition:var(--transition); }
.ticket-inline-reply textarea:focus { border-color:var(--accent); }
.ticket-actions-inline { display:flex; gap:8px; align-items:center; }
.stat-mini { background:var(--bg-2); border:1px solid var(--border); border-radius:12px; padding:14px 16px; text-align:center; flex:1; }
.stat-mini-val { font-size:22px;font-weight:800; }
.stat-mini-label { font-size:11px;color:var(--text-3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em; }
.warning-box { padding:16px; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); border-radius:10px; font-size:13px; color:#d97706; margin-bottom:16px; }
</style>
</head>

var currentTicketId = null;
var statusFilter = 'all';
var priorityFilter = 'all';

function getPriorityBadge(p) {
  var map = {urgent:'紧急',high:'高',medium:'中',low:'低'};
  return '<span class="badge priority-'+p+'">'+map[p]+'</span>';
}
function getStatusBadge(s) {
  var map = {open:'待处理',in_progress:'处理中',resolved:'已解决',closed:'已关闭'};
  var cls = {open:'status-open',in_progress:'status-progress',resolved:'status-resolved',closed:'status-closed'};
  return '<span class="badge '+cls[s]+'">'+map[s]+'</span>';
}
function getDeptBadge(d) {
  var map = {Technical:'技术支持',Billing:'财务账单',Sales:'销售咨询',Other:'其他'};
  return map[d]||d;
}

function getThreadHTML(replies) {
  var h = '<div class="ticket-thread">';
  replies.forEach(function(r){
    var cls = r.from==='admin'?'thread-admin':'thread-user';
    var abbr = r.name.charAt(0);
    h += '<div class="ticket-thread-msg"><div class="thread-avatar '+cls+'">'+abbr+'</div>';
    h += '<div class="thread-body"><div class="thread-meta"><strong>'+r.name+'</strong><span>'+r.time+'</span></div>';
    h += '<div class="thread-content">'+r.msg+'</div></div></div>';
  });
  h += '</div>';
  return h;
}

function renderTable() {
  var body = document.getElementById('ticketTableBody');
  var q = document.getElementById('ticketSearch').value.toLowerCase();
  var html = '';
  tickets.forEach(function(t,i){
    if (statusFilter!=='all' && t.status!==statusFilter) return;
    if (priorityFilter!=='all' && t.priority!==priorityFilter) return;
    if (q && !(t.id.toLowerCase()+t.user+t.subject+t.department).toLowerCase().includes(q)) return;
    var expanded = currentTicketId===t.id;
    html += '<tr class="ticket-row'+(expanded?' expanded':'')+'" onclick="toggleTicket(\''+t.id+'\')">';
    html += '<td style="font-family:var(--mono);font-size:13px">'+t.id+'</td>';
    html += '<td style="font-weight:600">'+t.user+'</td>';
    html += '<td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.subject+'</td>';
    html += '<td>'+getDeptBadge(t.department)+'</td>';
    html += '<td>'+getPriorityBadge(t.priority)+'</td>';
    html += '<td>'+getStatusBadge(t.status)+'</td>';
    html += '<td style="font-size:13px;color:var(--text-3)">'+t.lastReply+'</td>';
    html += '<td style="font-size:13px;color:var(--text-2)">'+t.created+'</td></tr>';
    html += '<tr class="ticket-expand'+(expanded?' show':'')+'" id="expand-'+t.id+'"><td colspan="8"><div class="ticket-detail-inline">';
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
    html += '<strong style="font-size:15px">'+t.subject+'</strong>';
    html += '<span style="font-size:12px;color:var(--text-3)">工单 '+t.id+' &middot; 创建 '+t.created+'</span>';
    html += '<div style="margin-left:auto;display:flex;gap:8px">';
    html += buildStatusSelect(t);
    html += '<button class="btn-sm danger" onclick="event.stopPropagation();openCloseModal(\''+t.id+'\')">关闭工单</button>';
    html += '</div></div>';
    html += getThreadHTML(t.replies);
    if (t.status!=='closed' && t.status!=='resolved') {
      html += '<div class="ticket-inline-reply"><textarea placeholder="输入回复..." id="replyText-'+t.id+'" rows="2"></textarea>';
      html += '<button class="btn-sm primary" onclick="event.stopPropagation();submitReply(\''+t.id+'\')">发送回复</button></div>';
    }
    html += '</div></td></tr>';
  });
  if (!html) html = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-3)">没有符合筛选条件的工单</td></tr>';
  body.innerHTML = html;
}

function buildStatusSelect(t) {
  var options = [{val:'open',label:'待处理'},{val:'in_progress',label:'处理中'},{val:'resolved',label:'已解决'},{val:'closed',label:'已关闭'}];
  var sel = '<select class="select-filter" onchange="event.stopPropagation();changeStatus(\''+t.id+'\',this.value)" style="font-size:12px">';
  options.forEach(function(o){
    sel += '<option value="'+o.val+'"'+(t.status===o.val?' selected':'')+'>'+o.label+'</option>';
  });
  sel += '</select>';
  return sel;
}

function toggleTicket(id) {
  if (currentTicketId===id) { currentTicketId=null; } else { currentTicketId=id; }
  renderTable();
}

function changeStatus(id, newStatus) {
  var t = tickets.find(function(x){return x.id===id;});
  if (!t) return;
  t.status = newStatus;
  if (newStatus==='closed') { currentTicketId=null; }
  showNotification('状态已更新', '工单 '+id+' 状态已变更为 '+(newStatus==='open'?'待处理':newStatus==='in_progress'?'处理中':newStatus==='resolved'?'已解决':'已关闭'), 'success');
  renderTable();
}

function submitReply(id) {
  var ta = document.getElementById('replyText-'+id);
  if (!ta || !ta.value.trim()) {
    showNotification('提示', '请输入回复内容', 'error');
    return;
  }
  var t = tickets.find(function(x){return x.id===id;});
  if (!t) return;
  var now = new Date();
  var ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  t.replies.push({from:'admin',name:'超级管理员',time:ts,msg:ta.value.trim()});
  if (t.status==='open') t.status='in_progress';
  t.lastReply = '刚刚';
  showNotification('回复成功', '回复已发送，用户将收到通知', 'success');
  renderTable();
}

function openCloseModal(id) {
  currentTicketId = id;
  ModalManager.open('closeModal');
}

function confirmClose() {
  var note = document.getElementById('closeNote').value.trim();
  if (!currentTicketId) return;
  var t = tickets.find(function(x){return x.id===currentTicketId;});
  if (!t) return;
  if (note) {
    var now = new Date();
    var ts = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    t.replies.push({from:'admin',name:'超级管理员',time:ts,msg:'[系统关闭] '+note});
  }
  t.status = 'closed';
  t.lastReply = '刚刚';
  document.getElementById('closeNote').value = '';
  ModalManager.close('closeModal');
  currentTicketId = null;
  showNotification('工单已关闭', '工单 '+t.id+' 已关闭', 'success');
  renderTable();
}

function filterTickets(status, el) {
  document.querySelectorAll('.filter-tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  statusFilter = status;
  currentTicketId = null;
  renderTable();
}

function filterByPriority(val) {
  priorityFilter = val;
  currentTicketId = null;
  renderTable();
}

document.addEventListener('DOMContentLoaded', function(){
  ThemeManager.init();
  renderTable();
  document.getElementById('ticketSearch').addEventListener('input', function(){
    currentTicketId = null;
    renderTable();
  });
});
</script>
</body>
</html>
