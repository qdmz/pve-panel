    <nav class="sidebar-nav">
      <div class="sidebar-section"><a class="sidebar-item" href="index.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>数据总览</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">节点管理</div><a class="sidebar-item" href="nodes.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>节点列表</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">业务管理</div><a class="sidebar-item" href="users.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户管理</a><a class="sidebar-item" href="vms.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>虚拟机管理</a><a class="sidebar-item" href="products.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>产品管理</a><a class="sidebar-item" href="orders.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>订单管理</a><a class="sidebar-item active" href="tickets-admin.html" style="background:rgba(234,88,12,0.1);color:var(--orange)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>工单管理</a></div>
      <div class="sidebar-section"><div class="sidebar-section-label">系统</div><a class="sidebar-item" href="settings.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>系统配置</a><a class="sidebar-item" href="backup.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.14"/></svg>数据备份</a></div>
    </nav>
    <div class="sidebar-footer"><div class="user-info"><div class="user-avatar" style="background:linear-gradient(135deg,var(--orange),#f59e0b)">A</div><div><div class="user-name" id="sidebarUserName">管理员</div><div class="user-balance" style="color:var(--orange)">Admin</div></div><a href="#" onclick="API.Auth.logout();return false" style="color:var(--text-3);margin-left:auto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></a></div></div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar"><button class="topbar-btn" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="breadcrumb"><a href="index.html">首页</a><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">工单管理</span></div><div style="margin-left:auto"><button class="topbar-btn" onclick="ThemeManager.toggle()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div></div>

    <div class="admin-page">
      <div style="margin-bottom:24px"><h1 style="font-size:22px;margin-bottom:4px">工单管理</h1><p style="font-size:14px;color:var(--text-3)">处理用户提交的工单，支持回复、关闭、优先级调整</p></div>
      <div class="table-wrapper">
        <table class="data-table"><thead><tr><th>ID</th><th>标题</th><th>用户</th><th>优先级</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none"><div class="modal-content" style="max-width:600px">
  <div class="modal-header"><h2>工单详情</h2><button class="modal-close" onclick="document.getElementById('modal').style.display='none'">&times;</button></div>
  <div class="modal-body">
    <div id="ticketDetail"></div>
    <div class="form-group" style="margin-top:16px"><label>回复</label><textarea class="form-input" id="replyContent" rows="3" placeholder="输入回复内容..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn default" onclick="updateTicketStatus('closed')">关闭工单</button>
    <button class="btn primary" onclick="submitReply()">发送回复</button>
  </div>
</div></div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
(function(){
  'use strict';
  if (!API.Auth.guard()) return;
  document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });
  const user = API.Auth.getUser();
  if (user) document.getElementById('sidebarUserName').textContent = user.name || '管理员';

  let currentTicketId = null;

  async function load() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px"></div>加载中...</td></tr>';
    const res = await API.getTickets();
    if (!res.success) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--red)">加载失败</td></tr>'; return; }
    const items = res.data.tickets || res.data || [];
    if (items.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-3)">暂无工单 🎉</td></tr>'; return; }

    tbody.innerHTML = items.map(t =>
      '<tr><td>' + t.id + '</td><td style="font-weight:600;cursor:pointer;color:var(--accent)" onclick="viewTicket('+t.id+')">' + esc(t.title||t.subject) + '</td>' +
      '<td>' + esc(t.user ? t.user.name : '-') + '</td>' +
      '<td>' + UI.statusBadge(t.priority||'medium', {high:['danger','紧急'],medium:['warning','中'],low:['info','低']}) + '</td>' +
      '<td>' + UI.statusBadge(t.status||'open', {open:['warning','开启'],closed:['success','已关闭']}) + '</td>' +
      '<td style="font-size:12px">' + UI.formatDate(t.created_at) + '</td>' +
      '<td><div style="display:flex;gap:4px">' +
      '<button class="btn-sm default" onclick="viewTicket('+t.id+')" style="font-size:11px">查看/回复</button>' +
      (t.status !== 'closed' ? '<button class="btn-sm default" onclick="closeTicket('+t.id+')" style="font-size:11px">关闭</button>' : '') +
      '</div></td></tr>'
    ).join('');
  }

  function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') : ''; }

  window.viewTicket = async function(id) {
    currentTicketId = id;
    const res = await API.getTicket(id);
    if (!res.success) { UI.notify(res.message,'error'); return; }
    const t = res.data.ticket || res.data;
    document.getElementById('ticketDetail').innerHTML = '<div style="background:var(--bg-3);padding:16px;border-radius:8px;margin-bottom:12px">' +
      '<h3>' + esc(t.title||t.subject) + '</h3>' +
      '<p style="font-size:13px;color:var(--text-2);margin-top:8px;white-space:pre-wrap">' + esc(t.content||t.description||'') + '</p>' +
      '<div style="margin-top:12px;font-size:12px;color:var(--text-3)">用户: ' + esc(t.user?.name||'-') + ' · ' + UI.formatDate(t.created_at) + '</div></div>' +
      (t.replies && t.replies.length ? '<div style="margin-bottom:12px">' + t.replies.map(r => '<div style="padding:8px 12px;margin-bottom:4px;background:var(--bg-2);border-radius:6px;font-size:13px">' +
        '<strong>' + (r.user?.name||'客服') + ':</strong> ' + esc(r.content||r.message) +
        '<span style="display:block;font-size:11px;color:var(--text-3)">' + UI.formatDate(r.created_at) + '</span></div>').join('') + '</div>' : '');
    document.getElementById('replyContent').value = '';
    document.getElementById('modal').style.display = 'flex';
  };

  window.submitReply = async function() {
    const content = document.getElementById('replyContent').value.trim();
    if (!content) { UI.notify('请输入回复内容','warning'); return; }
    const res = await API.replyTicket(currentTicketId, { content, message: content });
    if (res.success) { UI.notify('回复已发送','success'); document.getElementById('replyContent').value = ''; load(); }
    else UI.notify(res.message,'error');
  };

  window.updateTicketStatus = async function(status) {
    if (!currentTicketId) return;
    const res = await API.updateTicketStatus(currentTicketId, { status });
    if (res.success) { UI.notify('状态已更新','success'); document.getElementById('modal').style.display = 'none'; load(); }
    else UI.notify(res.message,'error');
  };

  window.closeTicket = async function(id) {
    const res = await API.updateTicketStatus(id, { status: 'closed' });
    if (res.success) { UI.notify('已关闭','success'); load(); }
    else UI.notify(res.message,'error');
  };

  load();
})();
</script>
</body>
</html>
