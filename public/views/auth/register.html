<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册账号 — CloudVM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="nav-brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.9"/>
            <rect x="15" y="2" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/>
            <rect x="2" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.6"/>
            <rect x="15" y="15" width="11" height="11" rx="3" fill="currentColor" opacity="0.3"/>
          </svg>
        </div>
        <span class="brand-name">CloudVM<span class="brand-pro">Pro</span></span>
      </div>
      <div class="auth-tagline">
        <h2>开启您的<br>云计算之旅</h2>
        <p>注册即可享受企业级 PVE 虚拟机服务，注册免费，按需付费。</p>
      </div>
      <div class="auth-features">
        <div class="auth-feature"><div class="auth-feature-dot"></div><span>30 秒极速开通虚拟机</span></div>
        <div class="auth-feature"><div class="auth-feature-dot"></div><span>KVM 全虚拟化 & LXC 容器双选</span></div>
        <div class="auth-feature"><div class="auth-feature-dot"></div><span>VNC + WebSSH 浏览器直接管理</span></div>
        <div class="auth-feature"><div class="auth-feature-dot"></div><span>99.9% SLA 保障，7×24 支持</span></div>
        <div class="auth-feature"><div class="auth-feature-dot"></div><span>邮件验证，账号安全有保障</span></div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrapper">
      <h1>创建账号</h1>
      <p class="subtitle">已有账号？<a href="login.html">立即登录</a></p>

      <div class="alert" id="alertMsg"></div>

      <form id="registerForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label>用户名 *</label>
            <input type="text" class="form-input" id="username" name="username" placeholder="3-20 个字符" data-required="true">
            <div class="form-error" id="usernameErr">请输入用户名（3-20字符，字母数字下划线）</div>
          </div>
          <div class="form-group">
            <label>真实姓名</label>
            <input type="text" class="form-input" id="realname" name="realname" placeholder="选填">
          </div>
        </div>

        <div class="form-group">
          <label>邮箱地址 *</label>
          <input type="email" class="form-input" id="email" name="email" placeholder="your@email.com" data-required="true">
          <div class="form-error" id="emailErr">请输入有效的邮箱地址</div>
        </div>

        <div class="form-group">
          <label>手机号</label>
          <input type="tel" class="form-input" id="phone" name="phone" placeholder="+86 选填">
        </div>

        <div class="form-group">
          <label>登录密码 *</label>
          <div class="form-input-icon">
            <input type="password" class="form-input" id="password" name="password" placeholder="至少 8 位，包含字母和数字" data-required="true">
            <span class="input-icon" onclick="togglePwd('password')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="form-error" id="passwordErr">密码至少 8 位，须包含字母和数字</div>
          <div id="pwdStrength" style="margin-top:6px;display:none">
            <div style="height:4px;border-radius:2px;background:var(--bg-3);overflow:hidden">
              <div id="pwdBar" style="height:100%;width:0%;border-radius:2px;transition:all 0.3s"></div>
            </div>
            <span id="pwdLabel" style="font-size:11px;color:var(--text-3)"></span>
          </div>
        </div>

        <div class="form-group">
          <label>确认密码 *</label>
          <div class="form-input-icon">
            <input type="password" class="form-input" id="confirmPwd" name="confirmPwd" placeholder="再次输入密码" data-required="true">
            <span class="input-icon" onclick="togglePwd('confirmPwd')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </span>
          </div>
          <div class="form-error" id="confirmErr">两次密码输入不一致</div>
        </div>

        <div class="form-group">
          <label>邮箱验证码 *</label>
          <div class="captcha-row">
            <input type="text" class="form-input" id="emailCode" name="emailCode" placeholder="请输入 6 位验证码" data-required="true" maxlength="6">
            <button type="button" class="btn-captcha" id="sendCodeBtn" onclick="sendEmailCode()">发送验证码</button>
          </div>
          <div class="form-error" id="codeErr">请输入正确的验证码</div>
        </div>

        <div class="form-group">
          <label>推荐码 / 优惠码</label>
          <input type="text" class="form-input" id="referral" name="referral" placeholder="选填">
        </div>

        <div class="form-agree">
          <input type="checkbox" id="agreeTerms">
          <label for="agreeTerms">我已阅读并同意 <a href="#">服务条款</a>、<a href="#">隐私政策</a> 及 <a href="#">AUP 政策</a></label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">注册账号</button>
      </form>
    </div>
  </div>
</div>

<script src="../../js/main.js"></script>
<script src="../../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => { ThemeManager.init(); });

function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Password strength
document.getElementById('password')?.addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('pwdBar');
  const label = document.getElementById('pwdLabel');
  const wrap = document.getElementById('pwdStrength');
  if (!val) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';

  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { w:'20%', c:'var(--red)', t:'极弱' },
    { w:'40%', c:'var(--orange)', t:'弱' },
    { w:'60%', c:'#f59e0b', t:'中等' },
    { w:'80%', c:'var(--green)', t:'强' },
    { w:'100%', c:'var(--green)', t:'非常强' }
  ];
  const l = levels[Math.min(score, 4)];
  bar.style.width = l.w; bar.style.background = l.c; label.textContent = l.t;
});

let codeSent = false;
async function sendEmailCode() {
  const email = document.getElementById('email').value;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('emailErr').classList.add('show');
    return;
  }
  const btn = document.getElementById('sendCodeBtn');
  btn.disabled = true;
  btn.textContent = '发送中...';

  // Real API call
  try {
    const res = await fetch('/api/send-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email, type: 'register' })
    });
    const data = await res.json();
    if (data.success) {
      codeSent = true;
      showNotification('验证码已发送', `验证码已发送至 ${email}，请查收`, 'success');
      startCountdown(60, btn, '重新发送');
    } else {
      showNotification('发送失败', data.message || '验证码发送失败，请稍后重试', 'error');
      btn.disabled = false;
      btn.textContent = '重新发送';
    }
  } catch(e) {
    showNotification('网络错误', '无法连接到服务器，请检查网络', 'error');
    btn.disabled = false;
    btn.textContent = '重新发送';
  }
}

document.getElementById('registerForm')?.addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const pwd = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPwd').value;
  const code = document.getElementById('emailCode').value;
  const agree = document.getElementById('agreeTerms').checked;

  let valid = true;

  if (!username || username.length < 3 || !/^[a-zA-Z0-9_]+$/.test(username)) {
    document.getElementById('usernameErr').classList.add('show'); valid = false;
  } else document.getElementById('usernameErr').classList.remove('show');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('emailErr').classList.add('show'); valid = false;
  } else document.getElementById('emailErr').classList.remove('show');

  if (!pwd || pwd.length < 8 || !/[A-Za-z]/.test(pwd) || !/[0-9]/.test(pwd)) {
    document.getElementById('passwordErr').classList.add('show'); valid = false;
  } else document.getElementById('passwordErr').classList.remove('show');

  if (pwd !== confirm) {
    document.getElementById('confirmErr').classList.add('show'); valid = false;
  } else document.getElementById('confirmErr').classList.remove('show');

  if (!code || code.length !== 6) {
    document.getElementById('codeErr').classList.add('show'); valid = false;
  } else document.getElementById('codeErr').classList.remove('show');

  if (!agree) {
    showAlert('请先阅读并同意服务条款', 'error'); return;
  }

  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;margin:0 auto"></div>';

  // Real API call
  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        name: username,
        email: email,
        password: pwd,
        password_confirmation: confirm,
        realname: document.getElementById('realname').value,
        phone: document.getElementById('phone').value,
        referral: document.getElementById('referral').value,
        code: code
      })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('注册成功！请查收邮件并点击激活链接完成账号激活。', 'success');
      setTimeout(() => { window.location.href = 'login.html?registered=1'; }, 2500);
    } else {
      showAlert(data.message || '注册失败', 'error');
      btn.disabled = false;
      btn.innerHTML = '注册账号';
    }
  } catch(e) {
    showAlert('网络连接失败，请检查服务器状态', 'error');
    btn.disabled = false;
    btn.innerHTML = '注册账号';
  }
});

function showAlert(msg, type) {
  const alert = document.getElementById('alertMsg');
  alert.textContent = msg;
  alert.className = `alert alert-${type} show`;
  setTimeout(() => alert.classList.remove('show'), 5000);
}
</script>
</body>
</html>
