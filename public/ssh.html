<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSSH — CloudVM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
body { background: #0a0a0f; color: #fff; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; overflow: hidden; }
.ssh-header { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 8px 20px; display: flex; align-items: center; gap: 12px; }
.ssh-header .brand-name { font-size: 14px; font-weight: 600; }
.ssh-header .vm-info { font-size: 12px; color: rgba(255,255,255,0.5); }
.ssh-header .btn-sftp { margin-left: auto; padding: 4px 12px; background: rgba(37,99,235,0.15); color: #2563eb; border: 1px solid rgba(37,99,235,0.3); border-radius: 6px; font-size: 12px; cursor: pointer; text-decoration: none; }
.ssh-body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 45px); padding: 20px; box-sizing: border-box; }
.ssh-error { text-align: center; padding: 40px; }
.ssh-error h2 { font-size: 20px; margin: 0 0 12px; color: #ef4444; }
.ssh-error p { font-size: 13px; color: rgba(255,255,255,0.6); margin: 0 0 20px; }
.btn-retry { padding: 8px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.ssh-loading { display: flex; flex-direction: column; align-items: center; gap: 16px; color: rgba(255,255,255,0.5); font-size: 13px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#terminal { width: 100%; height: calc(100vh - 45px); border: none; }
.ssh-info-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 32px; max-width: 400px; }
.ssh-info-card h3 { margin: 0 0 16px; font-size: 16px; }
.ssh-info-card .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; font-family: 'JetBrains Mono', monospace; }
.ssh-info-card .info-row:last-child { border-bottom: none; }
.ssh-info-card .label { color: rgba(255,255,255,0.4); }
.ssh-info-card .value { color: #10b981; }
.copy-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(37,99,235,0.2); color: #2563eb; border: none; cursor: pointer; }
</style>
</head>
<body>
<div class="ssh-header">
  <span class="brand-name">CloudVM<span style="color:#2563eb">Pro</span></span>
  <span class="vm-info" id="vmInfo">VM #-- · 正在连接...</span>
  <a class="btn-sftp" id="sftpLink" href="#" target="_blank">📂 SFTP 文件管理</a>
</div>
<div class="ssh-body" id="sshBody">
  <div class="ssh-loading" id="sshLoading">
    <div class="spinner"></div>
    <span>正在获取 SSH 连接信息...</span>
  </div>
  <div class="ssh-error" id="sshError" style="display:none">
    <h2>❌ 连接失败</h2>
    <p id="sshErrorMsg">无法获取 SSH 信息</p>
    <button class="btn-retry" onclick="connectSSH()">重新获取</button>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
const vmId = new URLSearchParams(location.search).get('vm');

document.addEventListener('DOMContentLoaded', () => {
  if (!vmId) { showError('缺少 VM ID 参数'); return; }
  document.getElementById('vmInfo').textContent = `VM #${vmId} · 正在连接...`;
  connectSSH();
});

function showError(msg) {
  document.getElementById('sshLoading').style.display = 'none';
  document.getElementById('sshError').style.display = 'block';
  document.getElementById('sshErrorMsg').textContent = msg;
}

async function connectSSH() {
  document.getElementById('sshLoading').style.display = 'flex';
  document.getElementById('sshError').style.display = 'none';

  try {
    const token = localStorage.getItem('admin_token');
    if (!token) { showError('请先登录'); return; }

    const res = await fetch(`/api/vms/${vmId}`, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
    });
    const data = await res.json();

    if (!data.success || !data.data) {
      showError(data.message || '无法获取 VM 信息');
      return;
    }

    const vm = data.data.vm || data.data;
    const ip = vm.ipv4 || vm.ip;
    const port = vm.ssh_port || 22;
    
    document.getElementById('vmInfo').textContent = `VM #${vmId} · ${vm.name || ''}`;

    // Try to use a WebSSH client (wetty/terminal)
    const websshUrl = `/api/vms/${vmId}/webssh`;
    
    document.getElementById('sshLoading').style.display = 'none';
    
    // Check if a WebSSH endpoint exists
    try {
      const wsRes = await fetch(websshUrl, {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
      });
      const wsData = await wsRes.json();
      if (wsData.success && wsData.data?.url) {
        document.getElementById('sshBody').innerHTML = `<iframe id="terminal" src="${wsData.data.url}" allowfullscreen></iframe>`;
        document.getElementById('sftpLink').href = wsData.data.sftp_url || '#';
        return;
      }
    } catch(e) {}

    // Fallback: show SSH connection info
    const host = ip || '获取中...';
    document.getElementById('sshBody').innerHTML = `
      <div class="ssh-info-card">
        <h3>🔌 SSH 连接信息</h3>
        <div class="info-row"><span class="label">主机</span><span class="value" id="sshHost">${host}</span></div>
        <div class="info-row"><span class="label">端口</span><span class="value" id="sshPort">${port}</span></div>
        <div class="info-row"><span class="label">用户名</span><span class="value">root</span></div>
        <div class="info-row" style="border:none"><span class="label">命令</span><span class="value" id="sshCmd" style="font-size:12px">ssh root@${host} -p ${port}</span></div>
        <div style="margin-top:16px"><button class="copy-btn" onclick="copyCmd()">📋 复制命令</button></div>
        <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:16px;text-align:center">使用终端 (Terminal / PuTTY) 连接<br>WebSSH 暂不可用</p>
      </div>`;
  } catch(e) {
    showError('网络连接失败');
  }
}

function copyCmd() {
  const cmd = document.getElementById('sshCmd')?.textContent || '';
  navigator.clipboard.writeText(cmd).then(() => {
    showNotification('已复制', 'SSH 命令已复制到剪贴板', 'success');
  }).catch(() => {});
}
</script>
</body>
</html>
